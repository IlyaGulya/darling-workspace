west-commands:
  - file: west_commands/dw.py
    commands:
      - name: dw
        class: DarlingWorkspace
        help: Darling workspace coordination and handoff
  - file: west_commands/patch.py
    commands:
      - name: patch
        class: DarlingPatch
        help: Apply tracked Darling patch profiles
  - file: west_commands/pr.py
    commands:
      - name: pr
        class: DarlingPr
        help: Manage staged and upstream Darling pull requests
  - file: west_commands/test.py
    commands:
      - name: test
        class: DarlingTest
        help: Run Darling regression/compat tests (changed-only, by bead, or full)
  - file: west_commands/doctor.py
    commands:
      - name: darling-doctor
        class: DarlingDoctor
        help: Verify manifest/build/deploy alignment before building or booting
  - file: west_commands/darling_prefix_repair.py
    commands:
      - name: darling-prefix-repair
        class: DarlingPrefixRepair
        help: Repair Darling prefix boot and guest-test prerequisites
  - file: west_commands/darling_rootless_debug_cleanup.py
    commands:
      - name: darling-rootless-debug-cleanup
        class: DarlingRootlessDebugCleanup
        help: Safely remove completed rootless Darling debug trees
  - file: west_commands/darling_build.py
    commands:
      - name: darling-build
        class: DarlingBuild
        help: Doctor-gated ninja build of dyld + closure, with opt-in deploy
  - file: west_commands/darling_source_worktree.py
    commands:
      - name: darling-source-worktree
        class: DarlingSourceWorktree
        help: Materialize exact nested source worktrees from local canonical refs
