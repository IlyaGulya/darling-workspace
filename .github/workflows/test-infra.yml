name: Darling compatibility tests

on:
  pull_request:
  push:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  host:
    runs-on: ubuntu-latest
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Run host compatibility tests
        run: darling-dev/darling-workspace/ci/run-test-tier.sh host

  guest-smoke:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Restore guest CommandLineTools cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/west/darling-command-line-tools
          key: darling-command-line-tools-v1-${{ runner.os }}
      - name: Install Darling build dependencies
        run: darling-dev/darling-workspace/ci/install-darling-build-deps.sh
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Run rootless guest smoke
        run: darling-dev/darling-workspace/ci/run-test-tier.sh guest-smoke
      - name: Capture rootless bootstrap syscall trace
        if: failure()
        continue-on-error: true
        working-directory: darling-dev/darling-workspace
        run: >-
          timeout --foreground --kill-after=15s 300s
          west test --prefix-profile homebrew
          --bootstrap-runtime-profile homebrew-prefix-baseline
          --bootstrap-timeout-seconds 75
          --runtime-build-timeout-seconds 180
          --bootstrap-syscall-trace .west-test/bootstrap-failure-trace
      - name: Collect guest runtime diagnostics
        if: always()
        working-directory: darling-dev/darling-workspace
        run: ci/collect-rootless-diagnostics.sh .west-test/rootless-diagnostics
      - name: Upload guest runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guest-smoke-runtime-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            darling-dev/darling-workspace/.west-test/rootless-diagnostics
            darling-dev/darling-workspace/.west-test/bootstrap-failure-trace
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/manifest.json
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/diagnostics/**
      - name: Cleanup test state
        if: always()
        working-directory: darling-dev/darling-workspace
        run: west test --gc

  guest-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Restore guest CommandLineTools cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/west/darling-command-line-tools
          key: darling-command-line-tools-v1-${{ runner.os }}
      - name: Install Darling build dependencies
        run: darling-dev/darling-workspace/ci/install-darling-build-deps.sh
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Run full rootless guest suite
        run: darling-dev/darling-workspace/ci/run-test-tier.sh guest-full
      - name: Capture rootless bootstrap syscall trace
        if: failure()
        continue-on-error: true
        working-directory: darling-dev/darling-workspace
        run: >-
          timeout --foreground --kill-after=15s 300s
          west test --prefix-profile homebrew
          --bootstrap-runtime-profile homebrew-prefix-baseline
          --bootstrap-timeout-seconds 75
          --runtime-build-timeout-seconds 180
          --bootstrap-syscall-trace .west-test/bootstrap-failure-trace
      - name: Collect guest runtime diagnostics
        if: always()
        working-directory: darling-dev/darling-workspace
        run: ci/collect-rootless-diagnostics.sh .west-test/rootless-diagnostics
      - name: Upload guest runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guest-full-runtime-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            darling-dev/darling-workspace/.west-test/rootless-diagnostics
            darling-dev/darling-workspace/.west-test/bootstrap-failure-trace
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/manifest.json
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/diagnostics/**
      - name: Cleanup test state
        if: always()
        working-directory: darling-dev/darling-workspace
        run: west test --gc

  macos-package:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Build installable native oracle bundle
        run: ci/run-test-tier.sh macos-package "$RUNNER_TEMP/oracle"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-oracle
          path: ${{ runner.temp }}/oracle

  macos:
    needs: macos-package
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: macos-oracle
          path: ${{ runner.temp }}/oracle
      - name: Run identical native macOS oracle bundle
        run: ci/run-test-tier.sh macos-installed "$RUNNER_TEMP/oracle"
