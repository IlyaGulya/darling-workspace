name: Darling compatibility tests

on:
  pull_request:
  push:
  # Scheduled run intentionally covers host only. Rootless smoke, CLT
  # provisioning, and native macOS tiers remain independently selectable.
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: Run exactly one test tier
        required: true
        type: choice
        options:
          - host
          - guest-smoke
          - guest-toolchain
          - clt-integrity
          - macos
          - macho-corpus-pilot
      ccache_mode:
        description: ccache mode for guest-toolchain only; other tiers ignore this input
        required: false
        default: warm
        type: choice
        options:
          - warm
          - cold

jobs:
  host:
    if: github.event_name != 'workflow_dispatch' || inputs.tier == 'host'
    runs-on: ubuntu-latest
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Run host compatibility tests
        run: darling-dev/darling-workspace/ci/run-test-tier.sh host

  guest-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tier == 'guest-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Install Darling build dependencies
        run: darling-dev/darling-workspace/ci/install-darling-build-deps.sh
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Build guarded test executor
        run: cargo build --release --locked --manifest-path darling-dev/darling-debug-runner/Cargo.toml
      - name: Run rootless guest smoke
        id: rootless_smoke
        run: darling-dev/darling-workspace/ci/run-test-tier.sh guest-smoke
      - name: Capture rootless bootstrap syscall trace
        if: failure()
        continue-on-error: true
        id: rootless_smoke_diagnostic
        working-directory: darling-dev/darling-workspace
        run: ci/run-rootless-bootstrap-diagnostic.sh .west-test/bootstrap-failure-trace
      - name: Collect guest runtime diagnostics
        if: always()
        working-directory: darling-dev/darling-workspace
        env:
          TIER_PREFIX: ${{ steps.rootless_smoke.outputs.prefix }}
          DIAGNOSTIC_PREFIX: ${{ steps.rootless_smoke_diagnostic.outputs.prefix }}
        run: |
          set -euo pipefail
          if [[ -n "$TIER_PREFIX" ]]; then
            ci/collect-rootless-diagnostics.sh .west-test/rootless-diagnostics/tier "$TIER_PREFIX"
          fi
          if [[ -n "$DIAGNOSTIC_PREFIX" ]]; then
            ci/collect-rootless-diagnostics.sh .west-test/rootless-diagnostics/bootstrap "$DIAGNOSTIC_PREFIX"
          fi
      - name: Upload guest runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guest-smoke-runtime-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            darling-dev/darling-workspace/.west-test/rootless-diagnostics
            darling-dev/darling-workspace/.west-test/bootstrap-failure-trace
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/manifest.json
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/diagnostics/**
      - name: Cleanup test state and runtime evidence
        if: always()
        working-directory: darling-dev/darling-workspace
        env:
          TIER_PREFIX: ${{ steps.rootless_smoke.outputs.prefix }}
          DIAGNOSTIC_PREFIX: ${{ steps.rootless_smoke_diagnostic.outputs.prefix }}
        run: |
          ci/cleanup-rootless-prefixes.sh \
            smoke "$TIER_PREFIX" \
            diagnostic "$DIAGNOSTIC_PREFIX"

  guest-toolchain-provisioning:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'guest-toolchain'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Restore reviewed guest CommandLineTools cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/west/darling-command-line-tools
          key: darling-command-line-tools-reviewed-v1-${{ runner.os }}
      - name: Install Darling build dependencies
        run: darling-dev/darling-workspace/ci/install-darling-build-deps.sh
      - name: Install guest-toolchain ccache
        run: sudo apt-get install --yes --no-install-recommends ccache
      - name: Configure guest-toolchain ccache
        id: guest_ccache
        working-directory: darling-dev/darling-workspace
        env:
          CCACHE_MODE: ${{ inputs.ccache_mode }}
        run: ci/guest-toolchain-ccache.sh prepare "$CCACHE_MODE"
      - name: Restore guest-toolchain ccache
        id: guest_ccache_restore
        if: inputs.ccache_mode == 'warm'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.guest_ccache.outputs.cache_dir }}
          key: ${{ steps.guest_ccache.outputs.primary_key }}
          restore-keys: |
            ${{ steps.guest_ccache.outputs.restore_prefix }}
      - name: Reset guest-toolchain ccache statistics
        run: ccache --zero-stats
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Build guarded test executor
        run: cargo build --release --locked --manifest-path darling-dev/darling-debug-runner/Cargo.toml
      - name: Provision CLT and compile and execute a guest binary
        id: rootless_toolchain
        run: darling-dev/darling-workspace/ci/run-test-tier.sh guest-toolchain
      - name: Collect guest runtime diagnostics
        if: always()
        working-directory: darling-dev/darling-workspace
        env:
          TIER_PREFIX: ${{ steps.rootless_toolchain.outputs.prefix }}
        run: |
          if [[ -n "$TIER_PREFIX" ]]; then
            ci/collect-rootless-diagnostics.sh .west-test/rootless-toolchain-diagnostics "$TIER_PREFIX"
          fi
      - name: Upload guest toolchain evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: guest-toolchain-runtime-evidence
          if-no-files-found: ignore
          retention-days: 7
          path: |
            darling-dev/darling-workspace/.west-test/rootless-toolchain-diagnostics
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/manifest.json
            darling-dev/darling-workspace/.west-test/runtime-evidence/**/diagnostics/**
      - name: Cleanup test state and runtime evidence
        if: always()
        working-directory: darling-dev/darling-workspace
        env:
          TIER_PREFIX: ${{ steps.rootless_toolchain.outputs.prefix }}
        run: ci/cleanup-rootless-prefixes.sh toolchain "$TIER_PREFIX"
      - name: Collect guest-toolchain ccache statistics
        if: always() && steps.guest_ccache.outcome == 'success'
        working-directory: darling-dev/darling-workspace
        run: ci/guest-toolchain-ccache.sh stats "$RUNNER_TEMP/guest-toolchain-ccache-evidence"
      - name: Upload guest-toolchain ccache statistics
        if: always() && steps.guest_ccache.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: guest-toolchain-ccache-statistics
          if-no-files-found: ignore
          retention-days: 7
          path: ${{ runner.temp }}/guest-toolchain-ccache-evidence
      - name: Save guest-toolchain ccache
        if: success() && inputs.ccache_mode == 'warm' && steps.guest_ccache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.guest_ccache.outputs.cache_dir }}
          key: ${{ steps.guest_ccache.outputs.primary_key }}

  macho-corpus-pilot-build:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'macho-corpus-pilot'
    strategy:
      fail-fast: false
      matrix:
        variant: [a, b]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Install West
        run: python3 -m pip install west
      - name: Install Darling build dependencies
        run: darling-dev/darling-workspace/ci/install-darling-build-deps.sh
      - name: Install pilot Mach-O inspection tools
        run: sudo apt-get install --yes --no-install-recommends llvm
      - name: Install guest-toolchain ccache
        run: sudo apt-get install --yes --no-install-recommends ccache
      - name: Materialize Darling workspace
        run: darling-dev/darling-workspace/ci/bootstrap-west.sh
      - name: Build one isolated Mach-O pilot
        working-directory: darling-dev/darling-workspace
        env:
          PILOT_OUTPUT: ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}
        run: ci/build-guest-macho-pilot.sh "$PILOT_OUTPUT" "${{ matrix.variant }}"
      - name: Upload pilot evidence only
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macho-corpus-pilot-${{ matrix.variant }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/select_fdset_guest
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/artifact.sha256
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/clang-version.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/clang-origin.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/clt-provenance.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/dylibs-used.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/file.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/guest-build.log
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/guest-marker.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/macho-manifest.json
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/macho-summary.tsv
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/private-header.txt
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/provenance.tsv
            ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}/provenance.txt
      - name: Cleanup pilot prefix and West state
        if: always()
        working-directory: darling-dev/darling-workspace
        env:
          PILOT_OUTPUT: ${{ runner.temp }}/macho-corpus-pilot/${{ matrix.variant }}
        run: |
          set +e
          status=0
          runner_temp="$PILOT_OUTPUT/.work/runner-temp"
          mkdir -p -- "$runner_temp"
          if [[ -f "$PILOT_OUTPUT/.prefix-path" ]]; then
            prefix="$(<"$PILOT_OUTPUT/.prefix-path")"
            if [[ -n "$prefix" ]]; then
              RUNNER_TEMP="$runner_temp" ci/cleanup-rootless-prefixes.sh corpus "$prefix" || status=1
            fi
          fi
          TMPDIR="$PILOT_OUTPUT/.work" west test --gc --gc-runtime-evidence || status=1
          TMPDIR="$PILOT_OUTPUT/.work" scripts/west-job.sh assert-no-live-west-test --state-root "$PILOT_OUTPUT/.work" || status=1
          exit "$status"

  macho-corpus-pilot-compare:
    needs: macho-corpus-pilot-build
    if: needs.macho-corpus-pilot-build.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.tier == 'macho-corpus-pilot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Download both pilot evidence artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macho-corpus-pilot-*
          path: ${{ runner.temp }}/macho-corpus-pilot-runs
          merge-multiple: false
      - name: Compare pilot binaries and stable provenance
        working-directory: darling-dev/darling-workspace
        run: ci/compare-guest-macho-pilot.sh "$RUNNER_TEMP/macho-corpus-pilot-runs"

  clt-integrity:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'clt-integrity'
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14, macos-15]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Download and verify CLT provenance without cache
        working-directory: darling-dev/darling-workspace
        run: ci/verify-clt-provenance.sh "$RUNNER_TEMP/clt-provenance"
      - name: Upload CLT provenance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clt-provenance-${{ matrix.runner }}
          if-no-files-found: error
          retention-days: 14
          path: |
            ${{ runner.temp }}/clt-provenance/provenance.txt
            ${{ runner.temp }}/clt-provenance/provenance.tsv
            ${{ runner.temp }}/clt-provenance/darling-catalog-response.json
            ${{ runner.temp }}/clt-provenance/darling-catalog-http-headers.txt
            ${{ runner.temp }}/clt-provenance/http-headers
            ${{ runner.temp }}/clt-provenance/signatures

  clt-integrity-compare:
    needs: clt-integrity
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'clt-integrity'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
      - name: Download both clean-runner provenance artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: clt-provenance-*
          path: ${{ runner.temp }}/clt-provenance-runs
          merge-multiple: false
      - name: Compare stable provenance fields
        working-directory: darling-dev/darling-workspace
        run: ci/compare-clt-provenance.sh "$RUNNER_TEMP/clt-provenance-runs"

  macos-package:
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'macos'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Build installable native oracle bundle
        run: ci/run-test-tier.sh macos-package "$RUNNER_TEMP/oracle"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-oracle
          path: ${{ runner.temp }}/oracle

  macos:
    needs: macos-package
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'macos'
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: macos-oracle
          path: ${{ runner.temp }}/oracle
      - name: Run identical native macOS oracle bundle
        run: ci/run-test-tier.sh macos-installed "$RUNNER_TEMP/oracle"
