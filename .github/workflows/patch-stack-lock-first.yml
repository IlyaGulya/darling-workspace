name: Manual patch-stack lock-first acceptance

on:
  workflow_dispatch:
  push:
    branches:
      - rewrite/rootless-ci-series
    paths:
      - .github/workflows/patch-stack-lock-first.yml

permissions:
  contents: read

jobs:
  patch-stack-lock-first:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/rewrite/rootless-ci-series')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DARLING_WEST_UPDATE_JOBS: 8
    steps:
      - name: Configure disposable paths
        run: |
          printf 'LOCK_FIRST_ROOT=%s\n' "$RUNNER_TEMP/patch-stack-lock-first" >>"$GITHUB_ENV"
          printf 'MISE_DATA_DIR=%s\n' "$RUNNER_TEMP/patch-stack-lock-first-mise-data" >>"$GITHUB_ENV"
          printf 'TMPDIR=%s\n' "$RUNNER_TEMP" >>"$GITHUB_ENV"
      - uses: actions/checkout@v7
        with:
          path: darling-dev/darling-workspace
          fetch-depth: 0
      - name: Install project-pinned tools with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          working_directory: darling-dev/darling-workspace
          mise_dir: ${{ runner.temp }}/patch-stack-lock-first-mise-data
          cache: false
          cache_save: false
      - name: Record project tool provenance
        working-directory: ${{ github.workspace }}/darling-dev/darling-workspace
        run: |
          set -euo pipefail
          mkdir -p "$LOCK_FIRST_ROOT/evidence"
          {
            printf 'mise_version='; mise --version
            printf 'uv_version='; mise exec -- uv --version
            printf 'west_version='; mise exec -- west --version
            printf 'mise_toml_sha256='; sha256sum mise.toml | awk '{print $1}'
          } >"$LOCK_FIRST_ROOT/evidence/diagnostics.txt"
      - name: Create identical frozen-manifest workspaces
        run: |
          set -euo pipefail
          mkdir -p "$LOCK_FIRST_ROOT/evidence"
          for side in control lock-first; do
            git clone --no-local --no-hardlinks \
              "$GITHUB_WORKSPACE/darling-dev/darling-workspace" \
              "$LOCK_FIRST_ROOT/$side/darling-workspace"
            git -C "$LOCK_FIRST_ROOT/$side/darling-workspace" checkout --detach "$GITHUB_SHA"
            test "$(git -C "$LOCK_FIRST_ROOT/$side/darling-workspace" rev-parse HEAD)" = "$GITHUB_SHA"
          done
      - name: Verify isolated West under empty homes
        run: |
          set -euo pipefail
          for side in control lock-first; do
            home="$LOCK_FIRST_ROOT/$side-home"
            workspace="$LOCK_FIRST_ROOT/$side/darling-workspace"
            mkdir -p "$home"
            mise -C "$workspace" exec -- env HOME="$home" west --version
          done
      - name: Configure repository-local identity
        run: |
          set -euo pipefail
          for side in control lock-first; do
            workspace="$LOCK_FIRST_ROOT/$side/darling-workspace"
            home="$LOCK_FIRST_ROOT/$side-home"
            mise -C "$workspace" exec -- env HOME="$home" ci/bootstrap-west.sh
            while IFS= read -r project; do
              git -C "$project" config user.name 'West Lock-first Acceptance'
              git -C "$project" config user.email west-lock-first@example.invalid
          done < <(mise -C "$workspace" exec -- env HOME="$home" west list -f '{abspath}')
          done
      - name: Control legacy materialization
        working-directory: ${{ runner.temp }}/patch-stack-lock-first/control/darling-workspace
        run: |
          set -euo pipefail
          workspace="$PWD"
          mise -C "$workspace" exec -- env HOME="$LOCK_FIRST_ROOT/control-home" \
            XDG_CACHE_HOME="$LOCK_FIRST_ROOT/control-cache" west patch apply --profile homebrew
          python3 ci/patch_stack_shadow_acceptance.py capture \
            --workspace "$PWD" --profile homebrew \
            --modules "$LOCK_FIRST_ROOT/evidence/control-modules.json" \
            --manifest "$LOCK_FIRST_ROOT/evidence/control-manifest.json"
      - name: Canonical lock-first materialization
        working-directory: ${{ runner.temp }}/patch-stack-lock-first/lock-first/darling-workspace
        run: |
          set -euo pipefail
          workspace="$PWD"
          mise -C "$workspace" exec -- env HOME="$LOCK_FIRST_ROOT/lock-first-home" \
            XDG_CACHE_HOME="$LOCK_FIRST_ROOT/lock-first-cache" west patch apply --profile homebrew --lock-first \
            --lock-first-evidence "$LOCK_FIRST_ROOT/evidence/lock-first-evidence.json"
          python3 ci/patch_stack_shadow_acceptance.py capture \
            --workspace "$PWD" --profile homebrew \
            --modules "$LOCK_FIRST_ROOT/evidence/lock-first-modules.json" \
            --manifest "$LOCK_FIRST_ROOT/evidence/lock-first-manifest.json"
      - name: Compare control and lock-first evidence
        if: always()
        working-directory: ${{ github.workspace }}/darling-dev/darling-workspace
        run: |
          set -euo pipefail
          LOCK_FIRST_ROOT="${LOCK_FIRST_ROOT:-$RUNNER_TEMP/patch-stack-lock-first}"
          python3 ci/patch_stack_lock_first_acceptance.py compare-lock-first \
            --control "$LOCK_FIRST_ROOT/evidence/control-modules.json" \
            --lock-first "$LOCK_FIRST_ROOT/evidence/lock-first-modules.json" \
            --control-manifest "$LOCK_FIRST_ROOT/evidence/control-manifest.json" \
            --lock-first-manifest "$LOCK_FIRST_ROOT/evidence/lock-first-manifest.json" \
            --evidence "$LOCK_FIRST_ROOT/evidence/lock-first-evidence.json" \
            --mapping locks/patch-stack/lock-first-series-v1.yml \
            --control-workspace "$LOCK_FIRST_ROOT/control/darling-workspace" \
            --lock-first-workspace "$LOCK_FIRST_ROOT/lock-first/darling-workspace" \
            --transaction-root "$RUNNER_TEMP" \
            --result "$LOCK_FIRST_ROOT/evidence/acceptance-result.json"
      - name: Cleanup lock-first workspaces
        if: always()
        run: |
          set +e
          status=0
          LOCK_FIRST_ROOT="${LOCK_FIRST_ROOT:-$RUNNER_TEMP/patch-stack-lock-first}"
          MISE_DATA_DIR="${MISE_DATA_DIR:-$RUNNER_TEMP/patch-stack-lock-first-mise-data}"
          mkdir -p "$LOCK_FIRST_ROOT/evidence" || status=1
          for repo in "$LOCK_FIRST_ROOT"/{control,lock-first}/darling-workspace; do
            [[ -d "$repo" ]] || continue
            while IFS= read -r gitdir; do
              worktree="$(dirname "$gitdir")"
              am_path="$(git -C "$worktree" rev-parse --git-path rebase-apply 2>/dev/null)" || { status=1; continue; }
              [[ "$am_path" = /* ]] || am_path="$worktree/$am_path"
              [[ ! -e "$am_path" ]] || git -C "$worktree" am --abort >/dev/null 2>&1 || status=1
            done < <(find "$repo/.." \( -name .git -type d -o -name .git -type f \) -print 2>/dev/null)
          done
          rm -rf -- "$LOCK_FIRST_ROOT/control" "$LOCK_FIRST_ROOT/lock-first" "$MISE_DATA_DIR" || status=1
          [[ ! -e "$MISE_DATA_DIR" ]] || status=1
          for pattern in west-patch-shadow-* west-lock-materialize-* west-patch-lock-first-*; do
            find "$RUNNER_TEMP" -maxdepth 1 -name "$pattern" -print -quit | grep -q . && status=1
          done
          "$GITHUB_WORKSPACE/darling-dev/darling-workspace/scripts/west-job.sh" assert-no-live-west-test --state-root "$RUNNER_TEMP" || status=1
          printf 'cleanup_status=%s\n' "$status" >"$LOCK_FIRST_ROOT/evidence/cleanup.txt"
          exit "$status"
      - name: Stage and validate artifact
        if: always()
        working-directory: ${{ github.workspace }}/darling-dev/darling-workspace
        run: |
          LOCK_FIRST_ROOT="${LOCK_FIRST_ROOT:-$RUNNER_TEMP/patch-stack-lock-first}"
          python3 ci/patch_stack_shadow_acceptance.py stage --source "$LOCK_FIRST_ROOT/evidence" --artifact "$LOCK_FIRST_ROOT/artifact"
      - name: Upload lock-first acceptance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: patch-stack-lock-first-acceptance
          if-no-files-found: warn
          retention-days: 14
          path: ${{ runner.temp }}/patch-stack-lock-first/artifact
