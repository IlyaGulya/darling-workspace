  publication-status: blocked
  publication-blocker: perf#18 SERVER-side shared-memory SPSC ring transport for darlingserver (pairs with guest-side xnu/shmem-ring-guest.patch in this profile). 78 commits above integration/homebrew tip. Experimental, behind DARLING_SERVER_FAST_OPS; wants ring ABI + trust-boundary review before upstreaming. See dar-dar6x4-perf-5dq.30.
  source-commit: 03cf98e489f6c7830d82e10b5ee2217d44b9a1ae
  sha256sum: 44ac2b59cab921e6065094348bc746555071203294950b9d16154f66584db5fe
