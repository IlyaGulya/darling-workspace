version: 1
description: Performance work that stacks ON TOP of the homebrew profile. The homebrew fixes (e.g. mldr glibc-fork-lock-reset and main-stack EEXIST fallback) are prerequisites for a bootable build, so this profile declares homebrew as its base rather than applying against the raw manifest revision.
base-profile: homebrew
integration-date: '2026-07-01T00:00:00Z'
patches:
- path: darling/mldr-compact-fd-band.patch
  sha256sum: 18545aee2d1ab085b86ce6d72f03a95a6874e9973031d705a5c623430b1f1891
  module: darling
  source-branch: fix/mldr-compact-fd-band
  source-commit: 0de8081a0a1c8a401bca7a43d2206ecabaecca80
  bead: dar-dar6x4-perf-5dq
  publication-status: blocked
  publication-blocker: perf#21b compact protected internal fd band is a local performance experiment; not proposed upstream. See perf#21b brief.
  test-exception:
    reason: needs-runtime-fd-band-probe
    note: |
      The patch changes guest-visible runtime fd-limit/internal-fd placement and fork fd-table cost. Current evidence is manual perf/boot/fork-storm measurement in the patch message; no automated west guest/runtime probe yet verifies compact service fds, compatible getrlimit behavior, and no internal-fd collision under an isolated prefix.
- path: xnu/shmem-ring-guest.patch
  sha256sum: 8b6aeb9acc982955db48cffec4d6b333de874d81e444a3e699acc03ba75966c9
  module: darling/src/external/xnu
  source-branch: perf/shmem-ring-guest
  source-base: 1169ebe2d99cf0c7ba36c1f2613fcf66a9cbbb1c
  source-commit: caddc2b7ef7718e60318f98ec39dab7d40df38ca
  bead: dar-1il.12
  publication-status: blocked
  publication-blocker: perf#18 guest shared-memory ring transport (D3..D18a staircase) is an EXPERIMENTAL transport, flag-gated behind DARLING_RING_TRANSPORT / DARLING_SERVER_FAST_OPS. It has a residual RPC-loss failure mode under heavy concurrent fork/exec/exit (see perf#25a-hang, bead dar A0). Not default-on, not proposed upstream. Base is 1169ebe (perf#7-generalize recv-spin), already exported by the homebrew profile as xnu/generalize-recv-spin-guest, so this patch carries ONLY the 17 ring-specific commits on top of it.
  test-exception:
    reason: needs-guest-ring-runtime-probe
    note: |
      The paired darlingserver patch has host/model trust-boundary gates, but this XNU guest patch needs an automated deployed-guest probe that exercises negotiated ring attach, ring/off fallback, duplex selftest, fork/postfork reset, and latency/counter invariants under an isolated Darling prefix. Do not count server-side model gates as coverage for this guest runtime patch.
- path: dyld/dcc2-reader.patch
  sha256sum: bc1acc8ba1a4c969d216391f022111eb14239c96c6fedb0707bb75ff5953f6a5
  module: darling/src/external/dyld
  source-branch: fix/dyld-dcc2-reader
  source-base: 63f667cf06d7ed59553adebb0c8d70a117135ac9
  source-commit: aec6a4af4efaacbda31911aaf32d73495d4a7da1
  bead: dar-dar6x4-perf-5dq.26
  publication-status: blocked
  publication-blocker: perf#24 DCC6 packed-shared-cache dyld reader (3-region + TEXT RIP-relative rewrite + precomputed fixup table). CLOSED as a functionally-proven, kernel-measured PROTOTYPE that is FLAG-GATED (DARLING_DYLD_DCC2=1 + DARLING_DYLD_DCC2_PATH) and NOT default-on; productization needs separate hardening (cache-build/staleness deploy, coverage beyond the 40-dylib closure, cache ABI-version discipline). See tests/PERF24-DCC6-FINAL.md. Base is 63f667cf (manifest dyld revision).
  test-exception:
    reason: prototype-needs-dcc2-runtime-harness
    note: |
      The patch is an explicitly flag-gated WIP/prototype and the patch message notes a live 2-dylib smoke crash. It needs an automated DCC2 cache-builder/reader runtime harness with valid-cache, stale-cache, missing-path, and fallback/hard-fail cases before it can be counted as covered.
- path: darlingserver/perf18-server-ring.patch
  module: darling/src/external/darlingserver
  source-branch: fix/perf18-server-ring
  source-base: 92049f05ceec9fa02b132b3882e264822586d91d
  bead: dar-dar6x4-perf-5dq.30
  publication-status: blocked
  publication-blocker: perf#18 SERVER-side shared-memory SPSC ring transport for darlingserver (pairs with guest-side xnu/shmem-ring-guest.patch in this profile). 78 commits above integration/homebrew tip. Experimental, behind DARLING_SERVER_FAST_OPS; wants ring ABI + trust-boundary review before upstreaming. See dar-dar6x4-perf-5dq.30.
  source-commit: 03cf98e489f6c7830d82e10b5ee2217d44b9a1ae
  sha256sum: 44ac2b59cab921e6065094348bc746555071203294950b9d16154f66584db5fe
  tests:
  - name: perf18_ring_host_gate_suite
    kind: gate
    coverage-tier: host
    env: host
    diag: bare
    red: true
    red-proof:
      mode: self
      why-self: |
        tests/run-ring-shm-validate.sh compiles explicit bad/stub arms and requires them to fail before running the real validator/datapath/allowlist/wake/lane gates.
    runner: script
    script: tests/run-ring-shm-validate.sh
    timeout-seconds: 900
    note: |
      Hermetic host RED->GREEN ring gate suite carried by the patch; it executes validator, attach, datapath, allowlist, fastpath, lane/wake, and related model gates rather than matching source text.
- path: darlingserver/a0-hang-fixes.patch
  module: darling/src/external/darlingserver
  source-branch: fix/a0-hang-fixes
  source-base: eab7f3fe16c11774cf8e4c58aa547d400a846489
  bead: dar-a0-hang-fixes-gkev
  publication-status: provisional
  publication-blocker: 'A0 hang fix class (perf#25a-hang): stranded SIGCHLD / lost wait4 reply + interrupted-wait state-clobber family + exec-checkin race + zero-hang gate harness. 41 commits. Landed + gated; sits below A0-ARCH. See dar-a0-hang-fixes-gkev.'
  source-commit: 32eb65ac4eb434ccc7432bbb76c7fffabb99d676
  sha256sum: 736c60a0cbfde51bb0d9cc77047f40c0e163f732574ac70306e321b839150641
  tests:
  - name: a0_zero_hang_synth_gate
    kind: guest
    coverage-tier: runtime
    env: darling
    diag: guarded
    runner: script
    script: tests/a0-repro/a0-gate.sh
    args:
    - synth
    env-vars:
      A0_NEST_RUNS: '1'
      A0_CV_RUNS: '1'
      A0_BREW_RUNS: '0'
      A0_STRICT: '0'
    requires:
    - darling-prefix
    timeout-seconds: 1800
    note: |
      Bounded deployed-guest zero-hang gate from the patch: boot smoke plus nestwait, forkwait, and cvstorm2 synthetic repros under west-owned prefix/launcher cleanup. Full brew legs remain a slow manual/guarded acceptance run.
- path: xnu/j7e7-lane-wakefd-sentinel.patch
  sha256sum: 6883cbd4cd27fb6a4dd1ebd433fc769b1d8fa87adddb0587b28d5fa5b44d0b65
  module: darling/src/external/xnu
  source-branch: fix/j7e7-lane-wakefd-sentinel
  source-base: caddc2b7ef7718e60318f98ec39dab7d40df38ca
  source-commit: 8d554c2b67e809cb580692f19199a4fafcf1372a
  bead: dar-j7e7
  publication-status: blocked
  publication-blocker: 'dar-j7e7 regression fix for the D16 per-thread ring lanes (guest): __dserver_ring_postfork_reset() freed each lane on wake_fd>=0, but the static (zero-init) lane table has wake_fd==0 on un-attached lanes, so the fork child ran close(0) once per untouched lane -> broken stdin -> brew "cannot duplicate fd 0". Frees now gated on the ownership marker (active==1); wake_fd=-1 sentinel restored at claim+reset; FD_CLOEXEC set on the received wake_fd. Stacks on xnu/shmem-ring-guest.patch (base caddc2b). Same experimental ring transport gating; not upstream-proposed until the ring itself is. See dar-j7e7.'
  test-exception:
    reason: needs-guest-postfork-fd-probe
    note: |
      The paired darlingserver patch adds a hermetic model gate for the ownership predicate, but this XNU guest patch still needs an automated deployed fork/exec probe proving child stdin survives postfork_reset and wake_fd sentinels/FD_CLOEXEC behave under the real guest runtime.
- path: darlingserver/j7e7-postfork-reset-gate.patch
  sha256sum: ed025dd0c30f5429c45cdd3001a38712500d3649c3006d2cbf223b6d6a743f10
  module: darling/src/external/darlingserver
  source-branch: fix/j7e7-postfork-reset-gate
  source-base: 03cf98e489f6c7830d82e10b5ee2217d44b9a1ae
  source-commit: 757bb94c2e9fe43dfbab708f7dd7a0f4f0d56e70
  bead: dar-j7e7
  publication-status: blocked
  publication-blocker: 'dar-j7e7 test coverage: hermetic host gate ring_postfork_reset_gate_test.c pinning __dserver_ring_postfork_reset()''s resource-ownership predicate (the D16 multilane gate covered active/generation races but NOT what postfork_reset frees per lane -- the gap that let the close(0) regression ship). RED arms reproduce the shipped bug + a dropped sentinel; wired into run-ring-shm-validate.sh. Stacks on darlingserver/perf18-server-ring.patch (base 03cf98e). Pairs with xnu/j7e7-lane-wakefd-sentinel.patch. Same ring-experimental gating. See dar-j7e7.'
  tests:
  - name: j7e7_postfork_reset_gate_suite
    kind: gate
    coverage-tier: host
    env: host
    diag: bare
    red: true
    red-proof:
      mode: self
      why-self: |
        tests/run-ring-shm-validate.sh compiles postfork-reset bad arms for the shipped close(0) bug and missing -1 sentinel and requires both to fail before the fixed arm passes.
    runner: script
    script: tests/run-ring-shm-validate.sh
    timeout-seconds: 900
    note: |
      Hermetic host gate for the postfork_reset ownership predicate; complements, but does not replace, the needed deployed XNU guest fork/exec probe.
