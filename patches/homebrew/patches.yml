- path: xnu/sigexc-default-resend-self.patch
  sha256sum: 4649d491f7a3e1afbc350811d40a26a8d297dbcadff1bb4c600c31eaf14a90a1
  module: darling/src/external/xnu
  source-branch: fix/sigexc-default-resend-self
  source-commit: 362aafc1cbc28b00d7ec53827b6d94550a72ce79
  bead: dar-gwn.6.4
  publication-status: blocked
  publication-blocker: |-
    Fixes the dar-gwn.6.4 / dar-gwn.1.5 process-group-kill cascade. sigexc_handler's
    "emulating default signal effects" path re-raised the fatal default signal with
    kill(0, sig); pid 0 targets the caller's ENTIRE process group, not just the
    process, so a crashing child (e.g. gnulib's CHECK_PRINTF_SAFE printf-OOM conftest,
    which crashes by design) broadcast its SIGSEGV to its parent bash/configure/ruby
    and killed the whole build ("terminated by uncaught signal SEGV" -> libunistring
    install RC=1). Fix re-raises to THIS thread via tgkill(getpid(), gettid(), sig)
    (raise() semantics), matching macOS's per-process ux_handler delivery.
    VALIDATED: (1) server-side sigprocess trace (DSERVER_DARGWN64SIG) showed the
    BEFORE=cross-process SIGSEGV (sender=conftest nsid, code=0 SI_USER, 0x3e8 sig)
    to two parent bash pids; AFTER=0 cross-process deliveries across 156 events in a
    live libunistring fork-storm. (2) Portable grpkill_oracle (dar-gwn110-repro)
    A/B: real macOS 26.5.1 PASS == native Linux PASS == Darling-fixed PASS;
    Darling-unfixed FAIL. (3) brew reinstall wget: libunistring config.log ran PAST
    the OOM probe (L7255->29569, reached configure tail) with 0 "uncaught signal".
    Blocker: full brew-green end-to-end RC still being confirmed; also overlaps the
    dar-gwn.1.5 sigexc leg (re-opened) -- reconcile before publish.
  pr-draft: pr-drafts/xnu-sigexc-default-resend-self.md
  github:
    fork:
      repo: IlyaGulya/darling-xnu
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darling-xnu
      base: main
      state: local
- path: xnu/ulock-wait-eintr-retry.patch
  sha256sum: ea82c6717b64340f18f2beb8bd5b11f4b5f8c67be166f5fa2c66a91021a29d18
  module: darling/src/external/xnu
  source-branch: fix/ulock-wait-eintr-retry
  source-commit: 9d5c22289dc701e0875226827bed26d4c0ec0099
  bead: dar-gwn.6
  publication-status: blocked
  publication-blocker: >-
    Fixes the dar-gwn.6 os_unfair_lock corruption-abort SIGILL: under a
    fork/exec signal storm sys_ulock_wait returned -EINTR, which Darling's
    generic BSD-syscall cerror stub converted to -1, which os_unfair_lock's
    slow path (switch(-ret), only EINTR/EFAULT/EOWNERDEAD non-fatal) routed to
    _os_unfair_lock_corruption_abort -> ud2 -> SIGILL. Fix retries the futex on
    EINTR internally for untimed UL_COMPARE_AND_WAIT/UL_UNFAIR_LOCK waits (and
    drops the bogus 0x800 mask in ulock_wake). TDD: live [dargwn6] sigexc trace
    + symbolize.sh pinned the fault to __os_unfair_lock_lock_slow+0x13f (ud2);
    RED = sleep_stress2.rb fork-storm crashes at ROUND ~200; with the fix the
    SIGILL is eliminated (0 across a RUNS=8 NWORK=10 ROUNDS=600 storm, well past
    the baseline failure point). Blocked: a SEPARATE orthogonal failure
    (dar-gwn.1.5: a reaped-child SIGCHLD mis-delivered as a fatal signal with
    SI_USER, observed as SIGFPE handler=SIG_DFL) still ends the same storm, so
    full from-source brew end-to-end is not yet green.
  pr-draft: pr-drafts/xnu-ulock-wait-eintr-retry.md
  github:
    fork:
      repo: IlyaGulya/darling-xnu
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darling-xnu
      base: main
      state: local
