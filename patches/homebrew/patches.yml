- path: xnu/sigexc-default-resend-self.patch
  sha256sum: 76491ade81c3731f2e63f764af9fb7d32a1cd4fef3cef0fd3bb97d929bddf183
  module: darling/src/external/xnu
  source-branch: fix/sigexc-default-resend-self
  source-commit: a07f3001fb5fdfea471ac30bb79ef1b510cae29b
  bead: dar-gwn.6.4
  publication-status: blocked
  publication-blocker: |-
    Fixes the dar-gwn.6.4 / dar-gwn.1.5 process-group-kill cascade. sigexc_handler's
    "emulating default signal effects" path re-raised the fatal default signal with
    kill(0, sig); pid 0 targets the caller's ENTIRE process group, not just the
    process, so a crashing child (e.g. gnulib's CHECK_PRINTF_SAFE printf-OOM conftest,
    which crashes by design) broadcast its SIGSEGV to its parent bash/configure/ruby
    and killed the whole build ("terminated by uncaught signal SEGV" -> libunistring
    install RC=1). Fix re-raises to THIS thread via tgkill(getpid(), gettid(), sig)
    (raise() semantics), matching macOS's per-process ux_handler delivery.
    VALIDATED: (1) server-side sigprocess trace (DSERVER_DARGWN64SIG) showed the
    BEFORE=cross-process SIGSEGV (sender=conftest nsid, code=0 SI_USER, 0x3e8 sig)
    to two parent bash pids; AFTER=0 cross-process deliveries across 156 events in a
    live libunistring fork-storm. (2) Portable grpkill_oracle (dar-gwn110-repro)
    A/B: real macOS 26.5.1 PASS == native Linux PASS == Darling-fixed PASS;
    Darling-unfixed FAIL. (3) brew reinstall wget: libunistring config.log ran PAST
    the OOM probe (L7255->29569, reached configure tail) with 0 "uncaught signal".
    Blocker: full brew-green end-to-end RC still being confirmed; also overlaps the
    dar-gwn.1.5 sigexc leg (re-opened) -- reconcile before publish.
  tests:
  - name: sigexc_default_resend_self_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: source-base
      source-env: XNU_SRC_ROOT
      expect-failure-phase: run
    runner: c-fixture
    repo: darling-workspace
    script: tests/sigexc_default_resend_self_contract.c
    source-files:
    - darling/src/libsystem_kernel/emulation/src/linux_premigration/signal/sigexc.c
    fixture-include-dirs:
    - tests/fixtures/sigexc/include
    include-dirs:
    - darling/src/libsystem_kernel/emulation/include
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    - -Wno-unused-parameter
    - -Wno-unused-variable
    - -Wno-unused-but-set-variable
    - -Wno-unused-function
    - -include
    - string.h
    note: Compiles real sigexc_handler and verifies the fatal default-action path re-raises with tgkill(self pid, self tid, signal) instead of kill(0, signal) process-group broadcast.
  - name: sigexc_default_resend_self_guest
    kind: guest
    runs: guest
    diag: guarded
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/sigexc_default_resend_self_guest.c
    ok-marker: SIGEXC_DEFAULT_RESEND_SELF_GUEST_OK
    timeout-seconds: 30
    requires:
    - darling-prefix
    note: Guest runtime gate that a child taking default SIGSEGV does not broadcast SIGSEGV to its parent process group.
  pr-draft: pr-drafts/xnu-sigexc-default-resend-self.md
  github:
