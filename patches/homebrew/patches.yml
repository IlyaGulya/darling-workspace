- path: darlingserver/processcall-exception-guard.patch
  sha256sum: ed5884e70b296f1d12ac889b3f3358692987d49c7391eff3eccb37546d0dc357
  module: darling/src/external/darlingserver
  source-branch: fix/processcall-exception-guard
  source-commit: a52a15e2412cda068548e40047d8a3b18d3dba0b
  bead: dar-gwn.1.5
  publication-status: blocked
  publication-blocker: |-
    brew install not yet green end-to-end. dar-gwn.1.5 leg B core still open: the spurious
    SI_USER SIGSEGV delivered to a syscall-parked guest thread via the sigexc path; also the
    dar-gwn.1 fetch-phase reply-loss hang. This patch now guards ALL THREE server-killing throw
    sites including the event-loop Call::callFromMessage at server.cpp:541, which is the path
    that turns the leg-B SEGV's pending-call-overwrite throw into a server terminate + dar-pot
    guest leak. ONE clean before/after captured (brew install libunistring): pre-fix produced
    "terminate called ... Thread's pending call overwritten while active" + dead server + 14
    orphaned mldr; post-fix had the same SEGV trigger but the server stayed alive, no terminate,
    clean exit. Non-regressive across repeated boots (0 zombie darlingserver, 0 post-cleanup
    mldr leak). Caveat: the overwrite race is flaky, so the guard's log+drop line was not
    separately caught firing in a controlled boot; justification rests on the one before/after
    plus static proof this is the only uncaught throw site on the event-loop path.
  pr-draft: pr-drafts/darlingserver-processcall-exception-guard.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
