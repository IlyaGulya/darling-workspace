- path: xnu/eunion-18-exitpath-locale.patch
  sha256sum: 6ff06baed9149f736af2bfa2c8322f4916e31897b3b1599a1599019c1c6e7796
  module: darling/src/external/xnu
  source-branch: fix/e-union-18-exitpath-locale
  source-base: d87aa6d5d23b81cc434464a09ff7093a3649a564
  source-commit: 7c4af0d829b603a28ff0e326e3cf38ca33514f78
  bead: dar-test-infra-sp5.8.4.4
  publication-status: blocked
  publication-blocker: BASELINE fix (outside #ifdef EUNION) surfaced by the E-UNION harness. The EXIT_PATH escape-hatch check used strncasecmp_l(current_path+current_root_len, EXIT_PATH, ..., LC_C_LOCALE) where LC_C_LOCALE is ((locale_t)NULL); glibc's strncasecmp_l dereferences the locale the instant the bytes match, so a NULL locale SEGVs precisely when a guest path equals EXIT_PATH ("/Volumes/SystemRoot") — exactly when the escape hatch fires (gcc warns -Wnonnull). EXIT_PATH is pure ASCII, so the case-fold needs no locale; replaced with a locale-free ASCII comparator (eunion_ascii_ncasecmp) and removed the dead locale_t/LC_C_LOCALE/strncasecmp_l decls. Mutation-verified (EP1-EP4 — always-equal, no-fold, asymmetric-fold all caught). Local experiment under dar-test-infra-sp5.8.4.4.10.
