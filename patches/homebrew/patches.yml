- path: darlingserver/assert-wait-cancel-stale-timer.patch
  sha256sum: fd319351bac8e28fa8bde99f90699ddfd5139dc3ee49d1daea7b07ed9f014266
  module: darling/src/external/darlingserver
  source-branch: fix/assert-wait-cancel-stale-timer
  source-commit: 69715cc293f08a15f76c223f7e43571949aa585f
  bead: dar-gwn.1.9
  publication-status: blocked
  publication-blocker: |-
    brew install not yet green end-to-end. This closes the residual half of
    the dar-gwn.1.8/.1.9 download_queue ETIMEDOUT abort that the
    thread_unblock() cancel (cancel-stale-wait-timer, dar-gwn.2) did not
    reach. Root cause (instrumented, DSERVER_TMRTRACE): a timed psynch cvwait
    is woken (THREAD_AWAKENED) and its continuation re-blocks in a new untimed
    wait before the prior wait's wait_timer is serviced, via a wakeup path
    that does not route through thread_unblock(); the leftover timer then
    fires thread_timer_expire -> clear_wait_internal(THREAD_TIMED_OUT) on the
    new untimed wait, surfacing as a bogus ETIMEDOUT that Ruby's
    rb_native_cond_wait makes a fatal [BUG] (Homebrew download_queue.rb:184).
    Fix cancels any leftover armed wait_timer at the top of
    waitq_assert_wait64_locked before (re)arming, matching XNU's invariant
    that a thread entering assert_wait has no live wait_timer. Proven
    RED->GREEN by a deterministic fork/exec-storm Ruby repro
    (dar-gwn18-etimedout-repro/sleep_stress2.rb): baseline aborts at
    download_queue.rb:184 within RUN1/ROUND0 and TMRTRACE shows the stale
    untimed-wait timeout firing; fixed shows 0 stale across tens of thousands
    of timer expiries and no abort. Complements (does not replace)
    cancel-stale-wait-timer. Full from-source brew end-to-end still pending.
  tests:
  - name: assert_wait_cancel_stale_timer_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/wait_timer_prepare_for_wait_contract.c
    source-env: DSERVER_SRC_ROOT
    include-dirs:
    - duct-tape/internal-include
    compile-flags:
    - -std=c11
    - -Wall
    - -Wextra
    - -Werror
    note: Compile invariant for the production prepare-for-wait helper used by assert_wait; runtime trace RED carries the behavioral proof because a source-base compile failure only proves the old helper API is absent.
  - name: wait_timer_assert_prepare_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/wait-timer/assert-prepare-diagnostics-no-fix.patch
      expect-output-contains:
      - test_fault.consume name=waitq.assert_wait_stale_timer
      - dtape.wait_timer event=wait_prepare_fault_uncleared
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/wait_timer_assert_prepare_guest.c
    ok-marker: WAIT_TIMER_ASSERT_PREPARE_GUEST_OK
    timeout-seconds: 30
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    link-flags:
    - -pthread
    requires:
    - darling-prefix
    host-temp-files:
    - env: DSERVER_TEST_FAULT_FILE
      prefix-relative-path: private/var/tmp/dserver-wait-prepare-fault
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-wait-prepare.trace
      contains:
      - test_fault.consume name=waitq.assert_wait_stale_timer
      - dtape.wait_timer event=wait_prepare_fault
      - dtape.wait_timer event=wait_prepare_fault_cleared
      - had_timer=0 active=0
    note: |-
      Guest runtime proof for the assert_wait stale-timer invariant. The guarded
      diagnostic fault injects a synthetic leftover wait_timer immediately before
      a real guest pthread_cond_wait enters waitq_assert_wait64_locked. Fixed
      runtime clears it in dtape_thread_prepare_for_wait and traces
      wait_prepare_fault_cleared with had_timer=0; current-minus bad runtime has
      the same diagnostic hook but no prepare-for-wait cleanup, so it traces only
      wait_prepare_fault_uncleared and fails instead of relying on generic timing
      stress.
  pr-draft: pr-drafts/darlingserver-assert-wait-cancel-stale-timer.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
- path: darlingserver/pthread-canceled-xnu-semantics.patch
  sha256sum: 083622c4d24fbcfaed07c4e1d2024f7e93c24c174294e5c7f1c947da1249a50d
  module: darling/src/external/darlingserver
  source-branch: fix/pthread-canceled-xnu-semantics
  source-base: 69715cc293f08a15f76c223f7e43571949aa585f
  source-commit: ec379950edcf9710f81f1d0fcffc5287f996a0a2
  bead: dar-gwn.6.3
  publication-status: blocked
  publication-blocker: |-
    brew install not yet green end-to-end with this fix. Implements the
    __pthread_canceled / __pthread_markcancel RPC handlers (Call::PthreadCanceled
    and Call::PthreadMarkcancel), which were TODO stubs replying -ENOSYS for
    every action. The stub broke the guest libpthread cancellation handshake:
    under a cancelable-syscall + fork storm the guest spun re-issuing
    dserver_callnum_pthread_canceled forever (~670/sec, 167k calls observed
    while brew's portable-ruby built libunistring) -- a livelock. Carries
    per-thread cancel state on dtape_thread (cancel_disable / cancel_pending /
    canceled, mirroring XNU UT_CANCELDISABLE / UT_CANCEL / UT_CANCELED) and
    implements XNU semantics (action1 clear-disable->0, action2 set-disable->0,
    action0 canceled?0:EINVAL; markcancel arms the target's pending bit). Stacks
    on ingest-error-reply (dar-gwn.6.2). Needs the live brew reinstall wget run
    from the full integration tree to confirm the #31 livelock clears and brew
    advances past the libunistring phase.
  tests:
  - name: pthread_cancel_state_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/pthread_cancel_state_contract.c
    source-env: DSERVER_SRC_ROOT
    include-dirs:
    - duct-tape/internal-include
    compile-flags:
    - -std=c11
    - -Wall
    - -Wextra
    - -Werror
    note: Compile invariant for the production pthread cancel-state helper; direct runtime RED carries the old-stub behavior because source-base compile failure only proves the helper header is absent.
