- path: darlingserver/no-reply-fire-and-forget-rpcs.patch
  sha256sum: 6e94e13814b687834201593bdebb569af113f354b1a2896658b615571b97e6f1
  module: darling/src/external/darlingserver
  source-branch: perf/no-reply-fire-and-forget-rpcs
  source-base: 4c528d99c54bc4da04b017690195ca628e065526
  source-commit: 96298b16269a3baf5919c6ff8f844e2b53bbb7cf
  bead: dar-dar6x4-perf-5dq.17
  publication-status: blocked
  publication-blocker: adds a NO_REPLY ("fire-and-forget") flag to the RPC wrapper generator -- the client wrapper sends and returns 0 without waiting for a reply (skipping the ~200us recvmsg reply-wait sleep that perf #6 showed dominates build wall-clock), and the server _sendReply is a no-op. Applied to pure setters set_dyld_info + set_executable_path (scalar args copied into the request datagram, status discarded). set_thread_handles was tried and reverted (early pthread init too sensitive). Ordering safe -- per-thread datagrams processed in send order. GOTCHA -- mldr statically links the rpc wrappers, so a NO_REPLY change requires rebuilding mldr+dylib+server together or guest launchd hangs in recvmsg. Validated boot + make -j8 500/500. RED->GREEN tests/no_reply_rpc_test.sh. Stacks on per-call-rpc-metrics. Wants review that each NO_REPLY call is truly reply-independent before upstreaming. See dar-dar6x4-perf-5dq.17.
