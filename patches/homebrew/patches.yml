- path: darlingserver/exc-fatal-reply-bound.patch
  sha256sum: 548e9558f540e7369c791831726624866fc5373ce2101cc932196743a078dce3
  module: darling/src/external/darlingserver
  source-branch: fix/exc-fatal-reply-bound
  source-commit: 8ee1bb6a5adcb8139ae96deade0e062f9b1069f9
  bead: dar-gwn.1.10
  publication-status: blocked
  publication-blocker: |-
    brew install not yet green end-to-end. This fixes the dar-gwn.1.10
    exception-delivery deadlock: a fatal EXC_BAD_ACCESS delivered to an
    in-process EXCEPTION_DEFAULT handler that consumes it but never resumes
    the faulting thread (gnulib's printf-OOM nocrash_init probe in
    libunistring ./configure) wedges forever, because the faulting microthread
    blocks in mach_exception_raise holding a libsystem_c lock the handler's
    exit() path then needs. macOS unwedges this via task teardown; darlingserver
    has no task_terminate, so both guest threads park in recvmsg and the process
    hangs. Fix bounds the fatal-exception reply wait (MACH_RCV_TIMEOUT 3s) so
    exception_triage falls through to the host ux_handler -> default SIGSEGV ->
    guest terminates (macOS-faithful). Scoped to EXC_BAD_ACCESS only after a
    live-verified regression: bounding EXC_BAD_INSTRUCTION broke the brew/Ruby
    download path's legitimate SIGILL catch-and-resume (deterministic SIGILL
    crash at the first fetch), gone once narrowed. Proven RED->GREEN by the
    deterministic gnulib-nocrash_init unit repro (dar-gwn110-repro/run-repro6.sh:
    baseline wedges 8s+ all-threads-recvmsg + server idle; fixed terminates ~3s
    after fault, no wedge). Full from-source brew run still blocked upstream of
    this by the orthogonal download_queue psynch cond_wait ETIMEDOUT
    (dar-gwn.1.8/.1.9 family), so end-to-end green is not yet demonstrable.
  tests:
  - name: exc_fatal_reply_bound_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/fatal_exception_reply_contract.c
    source-env: DSERVER_SRC_ROOT
    cc: cc
    include-dirs:
    - duct-tape/internal-include
    compile-flags:
    - -std=c11
    - -Wall
    - -Wextra
    - -Werror
    note: Compile invariant for the production fatal-exception reply wait helper; runtime RED carries the behavioral proof because old source lacks the helper header and a source-base compile failure would only prove missing test assets.
  - name: fatal_exception_unreplying_handler_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/pthread-canceled-xnu-semantics.patch
      - darlingserver/test-diagnostics-trace.patch
      expect-output-contains:
      - child wedged waiting for fatal exception reply
      - ORACLE_RC=1
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/fatal_exception_unreplying_handler_guest.c
    ok-marker: FATAL_EXCEPTION_UNREPLYING_HANDLER_OK
    timeout-seconds: 30
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    note: Guest runtime regression for a fatal EXC_BAD_ACCESS delivered to an EXCEPTION_DEFAULT handler that consumes the message and never replies; fixed darlingserver bounds the reply wait and lets the child terminate instead of wedging. Runtime RED builds the current stack minus this patch and its declared downstream skip closure.
  pr-draft: pr-drafts/darlingserver-exc-fatal-reply-bound.md
  github:
