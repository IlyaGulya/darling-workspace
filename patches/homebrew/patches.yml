- path: darlingserver/microthread-resume-race.patch
  sha256sum: c937102741fc500bddc1374a2b3b11da3397c60d2c31352a2762caa6f0b66e6a
  module: darling/src/external/darlingserver
  source-branch: fix/microthread-resume-race
  source-commit: a99d52248f437be96239a22c8ce5f58fbf32d221
  bead: dar-q95.8
  publication-status: ready
  tests:
  - name: microthread_resume_race_contract
    kind: contract
    coverage-tier: model
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      why-self: >-
        The race is a state-transition ordering invariant. This fixture runs
        the old dropped-wake transition and the production helper against the
        same resume-before-suspend, duplicate-resume, late-stop, and lifecycle
        cases without relying on scheduler timing.
      expect-output-contains:
      - MICROTHREAD_OLD_MODEL_LOST_EARLY_RESUME
      - MICROTHREAD_RESUME_MODEL_OK
    runner: c-fixture
    repo: darling-workspace
    script: tests/microthread_resume_contract.cpp
    source-env: DSERVER_SRC_ROOT
    cc: c++
    include-dirs:
    - internal-include
    compile-flags:
    - -std=c++17
    - -Wall
    - -Wextra
    - -Werror
    note: Behavioral old-vs-production wake-epoch state-machine proof.
  - name: microthread_resume_before_suspend_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    runtime-profile: homebrew-rootless-no-mount
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/microthread_resume_before_suspend_guest.c
    ok-marker: MICROTHREAD_RESUME_BEFORE_SUSPEND_OK
    timeout-seconds: 15
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    requires:
    - darling-prefix
    guest-env-vars:
      DSERVER_TEST_FAULT_FILE: /private/var/tmp/dserver-microthread-resume-before-suspend-fault
    host-temp-files:
    - env: DSERVER_TEST_FAULT_FILE
      prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend-fault
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend.trace
      contains:
      - test_fault.consume name=microthread.resume_before_suspend
      - microthread.dtape.resume_before_suspend
      - microthread.suspend.consume_pending_resume
    note: >-
      Guest runtime proof for the resume-before-suspend lost wakeup: a guest
      thread enters self thread_suspend while a guarded duct-tape diagnostic
      simulates the matching thread_resume before the microthread physically
      suspends. Fixed darlingserver records the early resume permit and returns
      from thread_suspend; bad current-minus runtime drops the wake and the
      guest fixture times out.
  pr-draft: pr-drafts/darlingserver-microthread-resume-race.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
