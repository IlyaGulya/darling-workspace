  - name: per_call_metrics_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: source-base
      source-env: DSERVER_SRC_ROOT
    runner: c-fixture
    repo: darling/src/external/darlingserver
    script: tests/per_call_metrics_test.cpp
    cc: c++
    source-files:
    - src/metrics.cpp
    include-dirs:
    - include
    - internal-include
    generated-headers:
      darlingserver/rpc.h: |
        #pragma once
        #include <stdint.h>

        #ifdef __cplusplus
        extern "C" {
        #endif

        #define DSERVER_CALL_UNMANAGED_FLAG 0x80000000u

        typedef enum dserver_callnum {
        	dserver_callnum_invalid = 0,
        	dserver_callnum_checkin = 1,
        	dserver_callnum_mach_msg_overwrite = 2,
        	dserver_callnum_vchroot = 3,
        } dserver_callnum_t;

        static inline const char *dserver_callnum_to_string(dserver_callnum_t callnum) {
        	switch ((uint32_t)callnum & ~DSERVER_CALL_UNMANAGED_FLAG) {
        	case dserver_callnum_checkin:
        		return "checkin";
        	case dserver_callnum_mach_msg_overwrite:
        		return "mach_msg_overwrite";
        	case dserver_callnum_vchroot:
        		return "vchroot";
