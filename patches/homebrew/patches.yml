    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/fork_checkin_bound_contract.cpp
    source-env: DSERVER_SRC_ROOT
    cc: c++
    include-dirs:
    - internal-include
    stub-headers:
    - darlingserver/duct-tape.h
    compile-flags:
    - -std=c++17
    - -Wall
    - -Wextra
    - -Werror
    note: Compile contract for the production fork-checkin wait helper; the guest runtime proof carries the RED behavior for the old unbounded fork-checkin wait.
  - name: fork_checkin_drop_timeout_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      expect-output-contains:
      - ORACLE_RC=124
      - test_fault.consume name=fork.drop_checkin
      current-minus-skip-patches:
      - darlingserver/fork-checkin-sticky-flag.patch
      - darlingserver/checkin-rwlock-across-suspend.patch
      - darlingserver/checkin-retask-current-thread-uaf.patch
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/fork-checkin/bound-drop-checkin-diagnostics-no-fix.patch
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/fork_checkin_drop_timeout_guest.c
    ok-marker: FORK_CHECKIN_DROP_TIMEOUT_OK
    timeout-seconds: 20
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    requires:
    - darling-prefix
    env-vars:
      DSERVER_TEST_FORK_CHECKIN_TIMEOUT_SECONDS: '1'
    guest-env-vars:
      DSERVER_TEST_FAULT_FILE: /private/var/tmp/dserver-fork-checkin-bound-fault
    host-temp-files:
    - env: DSERVER_TEST_FAULT_FILE
      prefix-relative-path: private/var/tmp/dserver-fork-checkin-bound-fault
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-fork-checkin-bound.trace
      contains:
      - test_fault.consume name=fork.drop_checkin
      - process.checkin.fork_drop
      - process.fork_wait result=timed_out
      - timeout=1
    note: >-
      Guest runtime proof for the bounded fork-checkin wait: diagnostics drops
      the child checkin before sticky/semaphore notification, fixed
      darlingserver times out after the guarded 1s test timeout, the guest
      atfork parent hook returns instead of wedging, and current-minus runtime
      without the bound remains stuck under the guest runner timeout.
  pr-draft: pr-drafts/darlingserver-fork-checkin-bound.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
- path: darlingserver/fork-checkin-sticky-flag.patch
  sha256sum: 420f9a7f7d4c39de6fb3bba5dde65557f83aea931213bc37372fd8766727cc05
  module: darling/src/external/darlingserver
  source-branch: fix/fork-checkin-sticky-flag
  source-commit: c9a0107fe772be7a0a12f5dca75d26e1038446ee
  bead: dar-gwn.6.5
  publication-status: blocked
  publication-blocker: needs review of the sticky-flag vs the underlying duct-tape sigexc-forced-clear_wait semaphore handoff/abort race; the real defect is that a signal-aborted semaphore wait loses a handed-off up(). The sticky flag is a correct, minimal fix at the fork-checkin layer but a broader duct-tape fix may be preferable upstream. Validated locally (RED->GREEN forkstorm2 + brew libunistring past the make stall).
  tests:
  - name: fork_checkin_sticky_flag_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/fork_checkin_sticky_contract.cpp
    source-env: DSERVER_SRC_ROOT
    cc: c++
    include-dirs:
    - internal-include
    stub-headers:
    - darlingserver/duct-tape.h
    compile-flags:
    - -std=c++17
    - -Wall
    - -Wextra
    - -Werror
    note: Compile contract for the production fork-checkin sticky state helper; the runtime dserverdbg oracle carries the RED proof for the old lost-checkin behavior.
  - name: fork_checkin_signal_storm_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/fork_checkin_signal_storm_guest.c
    ok-marker: FORK_CHECKIN_SIGNAL_STORM_OK
    timeout-seconds: 45
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    requires:
    - darling-prefix
    note: >-
      Guest fork/signal storm for lost fork-child checkins when the parent wait
      is interrupted. Current-minus-patch runtime RED materialization works with
      an explicit downstream skip closure, but this workload passed on the bad
      runtime; keep it as a GREEN gate until dar-r7fc.2.1 has a stronger
      deterministic RED repro.
  - name: fork_checkin_direct_sticky_oracle
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/checkin-rwlock-across-suspend.patch
      - darlingserver/checkin-retask-current-thread-uaf.patch
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/darlingserver/launchfree-test-diagnostics.patch
      - tests/fixtures/fork-checkin/skip-semaphore-hook.patch
      - tests/fixtures/fork-checkin/interrupt-wait-diagnostics.patch
      - tests/fixtures/processcall/dserverdbg-uidgid-fault-oracle.patch
      - tests/fixtures/fork-checkin/dserverdbg-fork-wait-sticky-oracle.patch
      expect-output-contains:
      - test_fault.consume name=fork.interrupt_wait parent=
      - process.fork_wait.force_interrupted parent=
      - test_fault.consume name=fork.skip_checkin_semaphore parent=
      - process.checkin.fork_skip_semaphore
      - DSERVERDBG_FORK_FIRST_WAIT_RC=-110
      - DSERVERDBG_FORK_SECOND_WAIT_RC=-11
      cmake-defines:
        DSERVER_TOOLS: true
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        - dserverdbg
        deploy:
        - bin/darlingserver
        - bin/dserverdbg
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-dserverdbg-fork-wait-sticky.sh
    ok-marker: DSERVERDBG_FORK_WAIT_STICKY_OK
    timeout-seconds: 45
    requires:
    - darling-prefix
    host-temp-files:
    - env: DSERVER_TEST_FAULT_FILE
      prefix-relative-path: private/var/tmp/dserver-fork-checkin-fault
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-fork-checkin-fault.trace
      contains:
      - test_fault.consume name=fork.interrupt_wait parent=
      - process.fork_wait.force_interrupted parent=
      - test_fault.consume name=fork.skip_checkin_semaphore parent=
      - process.checkin.fork_skip_semaphore
    note: >-
      Direct runtime proof for the sticky fork-checkin flag. dserverdbg checks
      in as a parent, forces the first fork_wait_for_child to return through the
      interrupted/timeout path, forks a real host child that checkins with the
      semaphore wakeup skipped, then retries fork_wait_for_child. Fixed runtime
      consumes the sticky child-checkin state and returns 0; current-minus bad
      runtime without the sticky flag loses the wakeup and leaves the retry
      without a server reply, so the direct oracle reports -EAGAIN after its
      bounded receive timeout.
  pr-draft: pr-drafts/darlingserver-fork-checkin-sticky-flag.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
