- path: darlingserver/checkin-retask-current-thread-uaf.patch
  sha256sum: 2957e47c0b32c3b9300d5509a1666a82b1a037b28154a9dff0e96fe9258ea812
  module: darling/src/external/darlingserver
  source-branch: fix/checkin-retask-current-thread-uaf
  source-base: 3ab48c982a7fc9d5410ebec219bd357b975a26ae
  source-commit: 24ae886e723cc37d41f472f210a216c36a3cd8e1
  bead: dar-l8k
  publication-status: blocked
  publication-blocker: fixes a heap use-after-free in Process::notifyCheckin's exec/"replace task" branch that crashed darlingserver under fork+exec storms (~1 in 3-6 heavy builds) and deterministically at boot under an ASan server build. The branch released the old dtape thread + task BEFORE republishing the new dtape thread as the microthread's current thread; the old task's IPC-space teardown (dtape_task_release -> ipc_space_terminate -> ipc_right_terminate -> ipc_port_destroy) reads current_thread()->ith_assertions (IMPORTANCE_INHERITANCE=1), and current_thread() resolves to mainThread->_dtapeThread which was still the just-freed old dtape_thread -> UAF (free at process.cpp dtape_thread_release, use at ipc_port.c:936; the rare prod symptom was a downstream SIGSEGV in the main loop's malloc on a corrupted freelist). Fix publishes _dtapeTask/_dtapeThread + new semaphores under _rwlock first, drops the lock, then releases the old thread/task (releases stay unlocked because dtape_task_release can suspend the microthread, same constraint as the dtape_*_create calls). Pinned via an ASan darlingserver build (DSERVER_ASAN=ON, detect_stack_use_after_return=0 to see past the fiber/ucontext fake-stack noise). RED->GREEN host gate tests/checkin_retask_current_thread_uaf.c + run-checkin-retask-current-thread-uaf.sh model the exact free/use ordering under ASan. Validated -- ASan server boots clean 3/3 (was UAF 3/3 pre-fix); fork-heavy make -j8 6/6 DONE clean. Distinct from 5e5d688 (that was the checkin _rwlock-across-suspend deadlock; this is the exec re-task current_thread UAF). Needs upstream review before publishing. See dar-l8k.
  tests:
  - name: checkin_retask_current_thread_uaf
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: '(RED arm tripped the use-after-free as expected)'
      why-self: The script contains explicit release-before-republish and republish-before-release ASan arms, so the UAF oracle is self-contained.
      note: Script requires release-before-republish to trip ASan and republish-before-release to pass.
    runner: self-contract-script
    script: tests/run-checkin-retask-current-thread-uaf.sh
    note: Host ASan RED->GREEN model for publishing the new dtape thread before releasing the old one.
  - name: checkin_retask_current_thread_runtime_trace
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/checkin/exec-diagnostics-no-retask.patch
      expect-output-contains:
      - process.checkin.exec_release_old_before_publish
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/checkin_exec_trace_guest.c
    ok-marker: CHECKIN_EXEC_TRACE_GUEST_OK
    timeout-seconds: 30
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    requires:
    - darling-prefix
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-checkin-retask.trace
      contains:
      - process.checkin.exec_begin
      - process.checkin.exec_publish_before_release
      - process.checkin.exec_release_old
    host-trace-oracle: true
    note: |-
      Guest runtime ordering proof for the exec retask UAF fix. The guest drives
      a real Darling self-exec and the server trace must show that the new
      dtape task/thread was published before old task/thread release. The
      current-minus RED runtime gets the same diagnostic helper on the old
      release-before-publish code and therefore fails this trace oracle.
- path: darlingserver/pot-guest-lifetime-binding.patch
  sha256sum: 1b5836c421f3cea1172a347c09956625c68199a39813b93950b7436c19d2cc3c
  module: darling/src/external/darlingserver
  source-branch: fix/pot-guest-lifetime-binding
  source-base: 24ae886e723cc37d41f472f210a216c36a3cd8e1
  source-commit: b983a36ada0c2d13125ca6c5c62cc0d417c272dc
  bead: dar-pot
  publication-status: blocked
  publication-blocker: |-
    dar-pot root fix: orphaned mldr guests leak across sessions and wedge fresh
    boots. darlingserver creates the guest PID namespace via clone(CLONE_NEWPID);
    the clone child (launchd, ns PID 1) now sets prctl(PR_SET_PDEATHSIG, SIGKILL)
    so that when darlingserver dies for any reason, ns-PID-1 dies with it and the
    kernel cascade-kills every guest in the namespace -- no guest can outlive its
    server, so none can accumulate. Set AFTER perma_drop_privileges (a credential
    change clears the pdeathsig) and BEFORE spawnLaunchd; survives the exec into
    mldr (not set-uid). Base = manifest-rev (the clone region is byte-identical
    across the homebrew/perf/arch stacks, so this is profile-independent and lives
    in the foundational homebrew profile). RED->GREEN hermetic host-model gate
    tests/pot_lifetime_binding_test.c + run-pot-lifetime-binding.sh (nobind arm
    reproduces the orphan = GUEST-SURVIVED; bind arm = GUEST-REAPED). LIVE-verified
    on the fixed binary (baseline d81b5cf1 + this fix, md5 6d854a92): 3/3 clean brew
    reinstalls leave zero mldr + zero zombie darlingserver after shutdown, and a
    SIGKILL of darlingserver alone (no darling shutdown) cascade-kills the guest via
    the pdeathsig. Needs upstream review before publishing. See dar-pot.
  tests:
  - name: pot_lifetime_binding
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: 'dar-pot gate GREEN: RED(nobind) reproduces the orphan'
      why-self: The script contains explicit nobind and bind arms, so the orphan-process lifetime oracle is self-contained.
      note: Script requires the nobind arm to reproduce an orphan and the bind arm to reap it.
    runner: self-contract-script
    script: tests/run-pot-lifetime-binding.sh
    note: Host RED->GREEN model for binding guest lifetime to darlingserver lifetime.
  - name: pot_lifetime_binding_runtime
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      expect-output-contains:
      - guest descendant survived darlingserver death
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-pot-lifetime-binding-runtime.sh
    timeout-seconds: 30
    requires:
    - darling-prefix
    note: Runtime gate that starts a real Darling guest process, kills only darlingserver, and verifies the guest descendants are reaped instead of surviving as orphaned mldr processes.
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
