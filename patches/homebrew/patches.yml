  publication-blocker: ports perf #3's bounded recv-spin (which only ever landed in mldr's copy of dserver-rpc-defs.h) into libsystem_kernel.dylib's RPC receive hook, so the guest build processes (clang/make/sh) also grab a fast RPC reply before sleeping instead of always blocking in recvmsg. Attacks the perf #6 57% __skb_wait reply-wait for the guest's OWN reply-bearing RPCs (mach_msg_overwrite 19% + mach_reply_port 8.7% + mach_port_deallocate 8.4% + self-traps -- perf #9-decompose). Bounded LINUX_MSG_DONTWAIT poll with a CPU pause then a blocking recvmsg fallback; never busy-waits unboundedly (symmetric to perf #1/#3). libc-free (raw syscall + ia32_pause, no env/TLS in the signal-blocked atomic region). Budget is compile-time DARLING_GUEST_RECVSPIN (default 512) -- CMake cache var lets A/B set 0 to disable. NOTE -- the hook is compiled into BOTH the dylib AND dyld so both must be rebuilt+redeployed. RED to GREEN tests/dylib_recv_adaptive_spin_test.sh. Correctness validated (clean boot + 200/200 fork-heavy build) before the prefix env degraded. Wall-clock A/B inconclusive (boot-noise-dominated for a few-percent RPC change, as perf #6 predicted) AND blocked by a separate env issue -- the prefix server lacks the dar-6x4 checkin-suspend crash fix 5e5d688 and segfaults under fork storms. Stacks on gate-hotpath-kprintf-debug. See dar-dar6x4-perf-5dq.14.
  tests:
  - name: dylib_recv_adaptive_spin_enabled_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: source-base
      source-env: XNU_SRC_ROOT
      expect-failure-phase: run
    runner: c-fixture
    repo: darling-workspace
    script: tests/dylib_recv_adaptive_spin_contract.c
    fixture-include-dirs:
    - tests/fixtures/dylib-recv/include
    include-dirs:
    - darling/src/libsystem_kernel/emulation/include
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    - -Wno-unused-function
    - -Wno-unused-label
    - -Wno-sign-compare
    - -Wno-int-conversion
    - -DDARLING_GUEST_RECVSPIN=3
    note: Compiles the production dylib RPC receive hook with syscall stubs and checks fast DONTWAIT success, bounded EAGAIN spin then blocking fallback, and real-error bailout.
  - name: dylib_recv_adaptive_spin_disabled_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    source-env: XNU_SRC_ROOT
    runner: c-fixture
