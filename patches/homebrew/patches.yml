      base: main
      state: local
- path: xnu/ulock-wait-eintr-retry.patch
  sha256sum: ea82c6717b64340f18f2beb8bd5b11f4b5f8c67be166f5fa2c66a91021a29d18
  module: darling/src/external/xnu
  source-branch: fix/ulock-wait-eintr-retry
  source-commit: 9d5c22289dc701e0875226827bed26d4c0ec0099
  bead: dar-gwn.6
  publication-status: blocked
  publication-blocker: >-
    Fixes the dar-gwn.6 os_unfair_lock corruption-abort SIGILL: under a
    fork/exec signal storm sys_ulock_wait returned -EINTR, which Darling's
    generic BSD-syscall cerror stub converted to -1, which os_unfair_lock's
    slow path (switch(-ret), only EINTR/EFAULT/EOWNERDEAD non-fatal) routed to
    _os_unfair_lock_corruption_abort -> ud2 -> SIGILL. Fix retries the futex on
    EINTR internally for untimed UL_COMPARE_AND_WAIT/UL_UNFAIR_LOCK waits (and
    drops the bogus 0x800 mask in ulock_wake). TDD: live [dargwn6] sigexc trace
    + symbolize.sh pinned the fault to __os_unfair_lock_lock_slow+0x13f (ud2);
    RED = sleep_stress2.rb fork-storm crashes at ROUND ~200; with the fix the
    SIGILL is eliminated (0 across a RUNS=8 NWORK=10 ROUNDS=600 storm, well past
    the baseline failure point). Blocked: a SEPARATE orthogonal failure
    (dar-gwn.1.5: a reaped-child SIGCHLD mis-delivered as a fatal signal with
    SI_USER, observed as SIGFPE handler=SIG_DFL) still ends the same storm, so
    full from-source brew end-to-end is not yet green.
  tests:
  - name: ulock_eintr_retry_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: source-base
      source-env: XNU_SRC_ROOT
      expect-failure-phase: run
    runner: c-fixture
    repo: darling-workspace
    script: tests/ulock_eintr_retry_contract.c
    source-files:
    - darling/src/libsystem_kernel/emulation/src/xnu_syscall/bsd/impl/psynch/ulock_wait.c
    - darling/src/libsystem_kernel/emulation/src/xnu_syscall/bsd/impl/psynch/ulock_wake.c
    include-dirs:
    - darling/src/libsystem_kernel/emulation/include
    generated-headers:
      darling/emulation/common/base.h: |
        #pragma once
        #ifdef __cplusplus
        #define CPP_EXTERN_BEGIN extern "C" {
        #define CPP_EXTERN_END }
        #else
        #define CPP_EXTERN_BEGIN
        #define CPP_EXTERN_END
        #endif
      darling/emulation/conversion/errno.h: |
        #pragma once
        int errno_linux_to_bsd(int err);
      darling/emulation/conversion/duct_errno.h: |
        #pragma once
        #include <conversion/duct_errno.h>
      darling/emulation/linux_premigration/linux-syscalls/linux.h: |
        #pragma once
        #define __NR_futex 202
        long test_linux_syscall(long nr, ...);
        #define LINUX_SYSCALL(n, ...) test_linux_syscall((n), __VA_ARGS__)
      darling/emulation/xnu_syscall/bsd/impl/psynch/ulock_wait.h: |
        #pragma once
        #include <xnu_syscall/bsd/impl/psynch/ulock_wait.h>
      darling/emulation/xnu_syscall/bsd/impl/psynch/ulock_wake.h: |
        #pragma once
        #include <xnu_syscall/bsd/impl/psynch/ulock_wake.h>
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    - -Wno-unused-parameter
    note: Compiles production ulock_wait/ulock_wake with a fake futex backend and checks untimed EINTR retry, timed EINTR passthrough, clean wake errno, and wake success behavior.
  - name: ulock_eintr_retry_guest
