- path: xnu/generalize-recv-spin-guest.patch
  sha256sum: 829e1c3dfa1efc8e4b53e87913409505d00a256ce3975fd4058266e5f9df3d5a
  module: darling/src/external/xnu
  source-branch: perf/generalize-recv-spin-guest
