- path: darling/mldr-recv-adaptive-spin.patch
  sha256sum: f02a4121cb97f595807a27afd61a471549aae3879935d784ec38eca122b35b83
  module: darling
  source-branch: fix/mldr-recv-adaptive-spin
  source-base: 67f40c81b103ba8fcbc2ee07965af7f9ac4d84e4
  source-commit: 3fd7a8ed87d7e187854f946b470885f6f660b205
  bead: dar-dar6x4-perf-5dq.3
  publication-status: blocked
  publication-blocker: makes mldr's RPC recv hook (dserver_rpc_hooks_receive_message) do a bounded NON-BLOCKING recv spin (MSG_DONTWAIT + CPU pause between polls) before the blocking recvmsg, so a fast checkin reply is grabbed without the thread sleeping. Faithful in-guest measurement showed the per-thread create cost is ~95% the checkin RPC round-trip (~205us) and only ~5% socket setup (~10us), and of that round-trip the server's own work is ~8us (post perf #2b) - the rest is the recvmsg sleep/wakeup latency this attacks (so socket pooling, the obvious option, was rejected as low-ROI). Single-storm A/B (same run, warmup cancels) cut per-checkin RPC latency 237us->183us (~23%); fork/exec/wait/pipe/exit-code correctness 200/200 ok; symmetric to the perf #1 creator-side adaptive wait and bounded so it never busy-waits unboundedly. Default on (DARLING_PERF3_RECVSPIN=512; =0 restores legacy blocking recv). CAVEAT not yet resolved- aggregate throughput A/B on this oversubscribed host (load 68/12 cores, node+clickhouse contention) was noise-dominated and could not confirm a throughput win (one ordering showed ON slightly slower), so the claim is a per-checkin LATENCY reduction, not a measured throughput gain; pause (not sched_yield) was chosen specifically to bound the saturation downside. Wants a clean-host throughput measurement + review of the default-on choice before upstreaming. RED->GREEN by tests/perf3_recv_adaptive_test.c (client voluntary ctx-switches/round-trip- blocking 0.79 FAIL, adaptive 0.00 PASS). See dar-dar6x4-perf-5dq.3.
  tests:
  - name: mldr_recv_adaptive_spin
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: '(RED failed as expected)'
      why-self: The script contains explicit blocking-recv and adaptive-spin arms, so the latency regression oracle is self-contained.
      note: Script requires blocking recv to exceed the sleep budget and adaptive spin to pass.
    runner: self-contract-script
    script: src/startup/mldr/tests/run-perf3-recv-adaptive.sh
    note: Host RED->GREEN model for bounded spin before blocking RPC recv.
  github:
    fork:
      repo: IlyaGulya/darling
      base: preupstream/master
      state: local
    upstream:
      repo: darlinghq/darling
      base: master
      state: local
- path: darlingserver/per-call-rpc-metrics.patch
  sha256sum: 491e95fb0024e62dd99e5b9a2e8f133b6e1548607539437598d15deb87ce7c9b
  module: darling/src/external/darlingserver
  source-branch: perf/per-call-rpc-metrics
