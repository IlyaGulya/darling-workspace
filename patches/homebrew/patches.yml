  - name: no_reply_rpc_generator_contract
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: 'GREEN: NO_REPLY calls fire-and-forget'
      why-self: The generator contract creates wrappers in a temporary tree and checks the bad source shape directly, so it does not need source checkout mutation.
      note: Script generates wrappers and asserts NO_REPLY calls omit receive/reply while normal calls still receive.
    runner: self-contract-script
    script: tests/no_reply_rpc_test.sh
    note: Source-level RED->GREEN generator contract for fire-and-forget RPC wrappers.
