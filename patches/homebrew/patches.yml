- path: darling/rootless-shellspawn-lifecycle.patch
  sha256sum: 5ed663590e5fa496fe66f6313bc896df11b8e0752524102547516879825d8542
  module: darling
  source-branch: fix/rootless-shellspawn-timeout-ci
  source-base: f8aa7404f19979d0ec4b54573238194b98de385a
  source-commit: 0d817c9f105d90048de1a592277455d54a85fb96
  bead: dar-7zvt.4
  publication-status: blocked
  publication-blocker: Rootless lifecycle remains local until the fresh-prefix guest and cleanup audit is complete.
  test-exception:
    reason: integration-runtime-provider
    scope: Structured shellspawn result errors are exercised by the adjacent fast-exit guest proof; a protocol-only minus-patch invocation cannot produce a meaningful standalone guest verdict.
  tests:
  - name: rootless_shellspawn_readiness
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      expect-failure-phase: script
      expect-output-contains:
      - Error connecting to shellspawn in the container
      - No such file or directory
      source-modules:
      - darling
      - darling/src/external/darlingserver
      - darling/src/external/xnu
      - darling/src/external/dyld
      - darling/src/external/corefoundation
      - darling/src/external/libsystem
      cmake-defines:
        DARLING_EUNION: true
      runtime-artifacts:
      - module: darling
        build-targets:
        - rootless_bootstrap
        resource: rootless-bootstrap
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-rootless-bootstrap-smoke.sh
    ok-marker: WEST_ROOTLESS_BOOTSTRAP_OK
    timeout-seconds: 60
    requires:
    - darling-prefix
    host-temp-files:
    - env: WEST_ROOTLESS_BOOTSTRAP_READY_FILE
      prefix-relative-path: private/var/tmp/west-rootless-bootstrap.ready
      guest-path: true
    env-vars:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
      DARLING_ROOTLESS_SHELLSPAWN_READY_TIMEOUT_MS: '60000'
      DARLING_TEST_SHELLSPAWN_READY_DELAY_MS: '40000'
    note: >-
      Rootless readiness behavior: a 40-second transient shellspawn socket absence
      is retried under the explicit 60-second readiness budget until the live init
      publishes the guest verdict.
  - name: rootless_shutdown_session
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      expect-failure-phase: script
      expect-output-contains:
      - rootless shutdown left prefix-owned process(es)
      source-modules:
      - darling
      - darling/src/external/darlingserver
      - darling/src/external/xnu
      - darling/src/external/dyld
      - darling/src/external/libsystem
      cmake-defines:
        DARLING_EUNION: true
      runtime-artifacts:
      - module: darling
        build-targets:
        - darling
        deploy:
        - bin/darling
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-rootless-shutdown-session.sh
    ok-marker: WEST_ROOTLESS_SHUTDOWN_SESSION_OK
    timeout-seconds: 60
    requires:
    - darling-prefix
    env-vars:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
  - name: rootless_shellspawn_fast_direct_exit
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      expect-failure-phase: run
      expect-output-contains:
      - shellspawn failed (errno=9)
      source-modules:
      - darling
      runtime-artifacts:
      - module: darling
        build-targets:
        - shellspawn
        deploy:
        - usr/libexec/shellspawn
    runner: guest-argv-fixture
    guest-argv:
    - /usr/bin/true
    expect:
      returncode: 0
    runtime-profile: homebrew-rootless-no-mount
    timeout-seconds: 20
    requires:
    - darling-prefix
    note: Fast guest exit must still produce a structured shellspawn completion verdict.
