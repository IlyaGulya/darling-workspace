    - -Wno-unused-label
    - -Wno-sign-compare
    - -Wno-int-conversion
    - -DDARLING_GUEST_RECVSPIN=0
    note: Compiles the production dylib RPC receive hook with syscall stubs and checks the legacy disabled budget blocks immediately.
  github:
