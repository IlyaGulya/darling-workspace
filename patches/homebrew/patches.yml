- path: darlingserver/server-inline-fastpath.patch
  sha256sum: ff7aa3ce83d9a6cb5f11cabc9c0083b2f623eb148d3b8b00e3db80949182b5b2
  module: darling/src/external/darlingserver
  source-branch: fix/server-inline-fastpath
  source-base: bd18a8bd71753b8321e513fe19cb724345f6b873
  source-commit: 3aa068c72bbcc622fcbec82986f4a716b28f1a0a
  bead: dar-dar6x4-perf-5dq.8
  publication-status: blocked
  publication-blocker: runs cheap, non-blocking RPCs INLINE on the darlingserver event loop instead of always handing every message to the worker pool. perf #2a profiling proved ~70% of server CPU under a fork/checkin storm was the main-loop->worker condvar handoff (pthread_cond_signal->futex_wake) for work that is <1% of CPU, which is why enabling the multi-threaded work queue regressed throughput ~32% vs single-threaded (and why upstream left DSERVER_SINGLE_THREADED on). Thread::doWork() never blocks its caller, so inlining is safe in both cases - a blocking call suspends its microthread (setcontext back to the loop) and resumes on the pool. Live A/B (8-proc tcstorm multistorm, DSERVER_SINGLE_THREADED=OFF): inline+MT 4676-7295 checkin/s vs ST baseline ~3830 vs naive-MT ~2594; checkin p99 512us->64us; 99.998% of RPCs handled inline (241 of 11.27M to the pool). Boot + 200x fork/exec/wait correctness verified, server stable across runs. RED->GREEN by tests/server_inline_fastpath.c (gates ctx-switches/item: handoff ~1/item fails, inline ~0/item passes). Stacks on the perf #0 progress-metrics commit (adds inline_handled/queued_to_pool counters). Wants design review (does this make the worker pool default-on? interaction with the DSERVER_SINGLE_THREADED flag) + a clean-host perf measurement before upstreaming. See dar-dar6x4-perf-5dq.8.
  tests:
  - name: server_inline_fastpath
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: '(RED path failed as expected)'
      why-self: The script contains explicit worker-handoff and inline-fastpath arms, so the bad and fixed cases are modeled in one test.
      note: Script first runs the per-message handoff model and requires it to fail, then runs the inline model and requires it to pass.
    runner: self-contract-script
    script: tests/run-server-inline-fastpath.sh
    note: Host RED->GREEN model for avoiding per-message worker handoff on cheap RPCs.
  github:
    fork:
      repo: IlyaGulya/darling
      base: preupstream/master
      state: local
    upstream:
      repo: darlinghq/darling
      base: master
      state: local
- path: darlingserver/checkin-rwlock-across-suspend.patch
  sha256sum: 988f9ce61d296fbf19470ecb540da4f9644a64eb4a6f6fe2ae8bf09ad5403556
  module: darling/src/external/darlingserver
  source-branch: fix/checkin-rwlock-across-suspend
  source-base: 3aa068c72bbcc622fcbec82986f4a716b28f1a0a
  source-commit: 496fe0259c42288bf21c6cb7e6d9340a67e32b29
  bead: dar-6x4
  publication-status: blocked
  publication-blocker: fixes a real darlingserver DEADLOCK (not slowness) under fork+exec storms (make -jN, libunistring/gettext builds) that intermittently wedges the server - rpcs_serviced goes flat, every guest hangs in recvmsg, no recovery. Root cause pinned live with gdb (__cur_writer == MAIN thread tid, the single worker blocked in pthread_rwlock_rdlock with __readers WRLOCKED|WRPHASE) - notifyCheckin() exec branch held the per-process std--shared_mutex _rwlock across the suspending dtape_task_create / dtape_thread_create / dtape_semaphore_* calls. _rwlock ownership is per-OS-thread, but perf #2b (server-inline-fastpath) runs cheap RPCs INLINE on the MAIN event-loop thread while a suspended microthread resumes on the WORKER; an exec checkin running inline on MAIN then strands the write lock owned by MAIN, and a sibling fork-checkin on the single worker blocks forever in _notifyListeningKqchannels() reading the same process lock - the only thread that could resume the holder. Pre-#2b this could not happen (all microthreads ran on the one worker; lock acquired+released on the same OS thread), so this is a latent hazard that perf #2b activated. Fix drops _rwlock around the dtape work and re-acquires it to publish the new task/thread/semaphore handles, mirroring the pattern the thread-clear loop just above already uses around the blocking notifyDead(). A/B under heavy fork+exec load - pristine inline-on WEDGED on attempt 1; forcing all calls to the worker pool (no inline) 20/20 builds clean; this fix with inline ON 20/20 builds clean. fork/exec/wait/exit-code correctness verified (HELLO_EXEC_OK, child fork chain, rc 7 propagation). RED-to-GREEN by tests/inline_suspend_rwlock_deadlock.c (a process rwlock held by one OS thread across a microthread suspension while another OS thread reads it - RED arm deadlocks via watchdog/exit 1, GREEN arm releases-before-suspend and passes; HOST test under 5s). Rebased over the fork-checkin helper/sticky split so the exec replacement path resets ForkCheckinState instead of the old raw atomic flag. Wants design review of the broader invariant (audit that no other Process _rwlock write region can suspend) before upstreaming. See dar-6x4 and epic dar-dar6x4-perf-5dq.
  tests:
  - name: inline_suspend_rwlock_deadlock
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: '(RED arm deadlocked as expected)'
      why-self: The script contains explicit lock-held and release-before-suspend arms, so the deadlock oracle is self-contained.
      note: Script requires lock-held-across-suspend to deadlock and release-before-suspend to pass.
    runner: self-contract-script
    script: tests/run-inline-suspend-rwlock-deadlock.sh
    note: Host RED->GREEN model for not holding Process::_rwlock across suspending dtape calls.
  - name: checkin_exec_rwlock_runtime_trace
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/checkin-retask-current-thread-uaf.patch
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/checkin/exec-diagnostics-no-rwlock.patch
      expect-output-contains:
      - process.checkin.exec_dtape_create_locked
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        deploy:
        - bin/darlingserver
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/checkin_exec_trace_guest.c
    ok-marker: CHECKIN_EXEC_TRACE_GUEST_OK
    timeout-seconds: 30
