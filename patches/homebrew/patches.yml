      - darlingserver/progress-metrics.patch
      - darlingserver/server-inline-fastpath.patch
      - darlingserver/checkin-rwlock-across-suspend.patch
      - darlingserver/per-call-rpc-metrics.patch
      - darlingserver/no-reply-fire-and-forget-rpcs.patch
      - darlingserver/guest-per-callnum-sleep-account.patch
      - darlingserver/checkin-retask-current-thread-uaf.patch
      - darlingserver/pot-guest-lifetime-binding.patch
      - darlingserver/test-diagnostics-trace.patch
      expect-output-contains:
      - DSERVERDBG_PTHREAD_CANCELED_ACTION1_RC=-38
      - DSERVERDBG_PTHREAD_CANCEL_STUB_OK
      source-patches:
      - tests/fixtures/darlingserver/launchfree-test-diagnostics.patch
      - tests/fixtures/pthread-cancel/dserverdbg-cancel-state-oracle.patch
      red-runner:
        runner: script
        repo: darling-workspace
        script: tests/run-dserverdbg-pthread-cancel-state.sh
        timeout-seconds: 30
        host-temp-files:
        - env: DSERVER_TEST_TRACE_FILE
          prefix-relative-path: private/var/tmp/dserver-pthread-cancel-state.trace
      cmake-defines:
        DSERVER_TOOLS: true
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        - dserverdbg
        deploy:
        - bin/darlingserver
        - bin/dserverdbg
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/pthread_cancel_read_guest.c
    ok-marker: PTHREAD_CANCEL_READ_GUEST_OK
    timeout-seconds: 20
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    note: |-
      Guest runtime gate for the pthread cancellation RPC handshake: a thread
