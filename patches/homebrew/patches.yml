- path: darling/rootless-bootstrapper-ordering.patch
  sha256sum: f72fef7d42246264bb75bca9faee0c36dcf2041984d81041fb7bc5ce7ce71aaa
  module: darling
  source-branch: fix/rootless-bootstrapper-ordering
  source-base: 72006d6a61504c5123b463f8369a8e09bc4b23cf
  source-commit: e257950104da34ec0646f2faeb5a23e1e80c05d4
  bead: dar-test-infra-sp5.45
  publication-status: blocked
  publication-blocker: Rootless bootstrapper ordering remains local until fresh-prefix guest CI is stable across repeated runs.
  test-exception:
    reason: integration-runtime-provider
    scope: The fix changes launchd's rootless system bootstrap scheduling; its contract is exercised by the existing fresh-prefix rootless guest bootstrap smoke rather than a source-only launchd unit.
  note: >-
    Rootless launchd defers the system bootstrapper until runtime setup has
    completed, then dispatches it from a one-shot kqueue callback. This keeps
    launchctl IPC out of launchd startup and prevents a startup fork race on
    loaded hosts.
- path: darling/rootless-prefix-initialization.patch
  sha256sum: ec7a94be23ea0cccbe1ecaf9715014970f50a081c3d0b1fd8c81d8bacc88325a
  module: darling
  source-branch: fix/rootless-prefix-initialization
  source-base: 38d47a35ce0a0718718c31705fb642aa1833dfcc
  source-commit: b5cbf7b8fdb3ca43befab5ca212a5008a3aa9c43
  bead: dar-test-infra-sp5.45.9
  publication-status: blocked
  publication-blocker: Product-owned rootless initialization is local until the fresh-prefix three-path CI audit is complete.
  tests:
  - name: rootless_prefix_initialization_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    runtime-profile: homebrew-rootless-bootstrap-minimal
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      clean-prefix: true
      source-revision: d0a7ccde59fed3c8493ed3b4180be71b1ff3569f
      current-minus-skip-patches:
      - darling/build-drift-gate.patch
      expect-failure-phase: bootstrap
      expect-output-contains:
      - Rootless shellspawn did not become ready
      source-modules:
      - darling
      - darling/src/external/darlingserver
      - darling/src/external/xnu
      - darling/src/external/dyld
      - darling/src/external/corefoundation
      - darling/src/external/libsystem
      - darling/src/external/bash
      cmake-defines:
        DARLING_EUNION: true
      runtime-artifacts:
      - module: darling
        build-targets:
        - rootless_bootstrap
        resource: rootless-bootstrap
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-rootless-prefix-init-smoke.sh
    ok-marker: ROOTLESS_PREFIX_INIT_GUEST_OK
    timeout-seconds: 60
    requires:
    - darling-prefix
    env-vars:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
    note: >-
      The RED run uses the immediately preceding runtime patchset and an empty
      prefix; the old runtime fails before shellspawn becomes ready because the
      product-owned rootless directory contract is absent. GREEN passes only
      when launchd initializes that contract and the guest probe can execute.
  - name: rootless_prebuilt_macho_regression
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    runtime-profile: homebrew-rootless-bootstrap-minimal
    runner: guest-command-fixture
    repo: darling-workspace
    guest-command: >-
      test -x /bin/bash &&
      test ! -e /Library/Developer/CommandLineTools/usr/bin/clang &&
      /bin/bash -c '
        set -eu;
        probe=/private/var/tmp/west-rootless-prebuilt-macho;
        printf "%s\\n" ROOTLESS_PREBUILT_MACHO_DATA > "$probe";
        test -f "$probe";
        IFS= read -r value < "$probe";
        test "$value" = ROOTLESS_PREBUILT_MACHO_DATA;
        printf "%s\\n" ROOTLESS_PREBUILT_MACHO_OK
      '
    expect:
      returncode: 0
      output-contains:
      - ROOTLESS_PREBUILT_MACHO_OK
    timeout-seconds: 30
    requires:
    - darling-prefix
    note: >-
      Ordinary rootless regression boundary: execute the source-owned,
      prebuilt /bin/bash Mach-O from the minimal component, exercise guest file
      I/O, and prove that this path does not depend on a provisioned guest CLT.
  - name: rootless_guest_toolchain_compile_execute
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    runtime-profile: homebrew-guest-toolchain-provisioning
    runner: guest-runtime-script
    repo: darling-workspace
    script: tests/run-guest-toolchain-proof.sh
    ok-marker: GUEST_TOOLCHAIN_PROOF_OK
    timeout-seconds: 120
    verify-clean-shutdown: true
    requires:
    - darling-prefix
    note: >-
      Scheduled/manual provider acceptance: a fresh prefix must expose the
      reviewed CLT, report clang --version, compile and execute a guest Mach-O,
      then shut down cleanly.
