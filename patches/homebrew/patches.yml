- path: libressl/libressl-283-nist-strict-aliasing.patch
  sha256sum: c33f592e3558a15cc0d515d83f26737d64a363ea354dbc30223a42f4c4061956
  module: darling/src/external/libressl-2.8.3
  source-branch: fix/libressl-283-nist-strict-aliasing
  source-commit: 7599e3e01d3b1a742aa0293123290f267b6eb720
  bead: dar-q95.6
  publication-status: ready
  tests:
  - name: libressl_nist_darling_cmake_target_regress
    use: darling-cmake-target-source-red
    red-proof:
      source-env: LIBRESSL_SRC_ROOT
    build-target: darling_ec_tls_regress
    source-dir: libressl
    ctest: bead:dar-q95.6
    run-binary: libressl/darling_ec_tls_regress
    fixture-files:
    - tests/darling_ec_tls_regress.c
    fallback-executable-sources:
    - libressl/tests/darling_ec_tls_regress.c
    fallback-include-dirs:
    - libressl/include
    - libressl/crypto
    fallback-link-libraries:
    - crypto44
    required-compile-options:
    - source: crypto/bn/bn_nist.c
      options: [-fno-strict-aliasing]
    - source: crypto/ec/ecp_nist.c
      options: [-fno-strict-aliasing]
    note: |
      RED->GREEN host behavior gate for the actual Darling CMake target. The
      runner builds crypto44 through LibreSSL's CMakeLists.txt, injects the
      current regression source into the source-base tree if needed, and runs
      darling_ec_tls_regress without adding -fno-strict-aliasing from metadata.
      Because the aliasing UB is compiler-dependent, RED is proven
      deterministically by the build graph too: the real CMake target must pass
      -fno-strict-aliasing to the vulnerable NIST translation units.
  - name: libressl_nist_strict_aliasing_regress
    kind: contract
    coverage-tier: host
    runs: host
    diag: bare
    runner: source-build-fixture
    script: tests/darling_ec_tls_regress.c
    build-commands:
    - ./configure --disable-shared --enable-static --disable-asm CFLAGS="${LIBRESSL_NIST_CFLAGS:--O2 -fno-strict-aliasing}"
    - make -j"${LIBRESSL_NIST_JOBS:-2}"
    run-commands:
    - cc -O2 tests/darling_ec_tls_regress.c -Iinclude -Icrypto -Lcrypto/.libs -lcrypto -o "$WEST_TEST_TMP/darling_ec_tls_regress"
    - "$WEST_TEST_TMP/darling_ec_tls_regress"
    - printf 'LIBRESSL_NIST_REGRESS_OK\n'
    timeout-seconds: 240
    note: |
      Host behavior GREEN gate that builds LibreSSL 2.8.3 libcrypto and runs the
      committed EC/SPKI regression program. This is not a RED proof: the patch
      changes Darling's CMake target flags, while this portable autotools build
      supplies -fno-strict-aliasing explicitly. True RED proof needs a Darling
      CMake target/source-build runner that exercises crypto44's
      target_compile_options.
  pr-draft: pr-drafts/libressl-283-nist-strict-aliasing.md
  github:
    fork:
      repo: IlyaGulya/darling-libressl
      base: preupstream/master
