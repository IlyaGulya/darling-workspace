- path: darling/mldr-thread-create-futex-wait.patch
  sha256sum: 34fca6f71c1bc83bed9e9ebca2efc8f1f8eb596c376a5214b53262ae441ec1f0
  module: darling
  source-branch: fix/mldr-thread-create-futex-wait
  source-base: 73a11f00a54d62504b7162325a88993dfaa6e087
  source-commit: dd6b42e57eed3cd4d1f576fcca8869b9b12efc21
  bead: dar-dar6x4-perf-5dq.1
  publication-status: blocked
  publication-blocker: replaces the UNBOUNDED thread-create-checkin busy-spin (sched_yield) with an ADAPTIVE bounded-spin-then-FUTEX_WAIT handshake in __darling_thread_create (keeps the fast-path spin so the common sub-100us checkin is not regressed, but caps CPU so a slow checkin can never monopolise a core). Correctness validated RED->GREEN by tests/regression/thread_create_checkin_wait.c (creator ~1ms CPU vs a core spinning 141-300ms) and futex compiled into both creator+child paths. Live single-storm A/B was within noise (~+3.6% creates/s fixed); a pure-FUTEX variant regressed the fast warm-server case ~25% (p50 16us spin beats a futex round-trip), which is why the adaptive form was chosen. Multistorm aggregate A/B was too noisy on this host (clickhouse contention, baseline alone 5.4k-8.3k/s) to resolve. Wants a second reviewer + a clean-host perf measurement before upstreaming. See dar-dar6x4-perf-5dq.1.
  tests:
  - name: thread_create_checkin_wait
    kind: contract
    runs: host
    diag: bare
    red: true
    red-proof:
      mode: self
      expect-output-contains: '(RED path failed as expected)'
      why-self: The script contains explicit sched_yield-spin and futex-wait arms, so the bad and fixed cases are modeled in one test.
      note: Script first runs the old sched_yield spin model and requires it to fail, then runs the futex model and requires it to pass.
    runner: self-contract-script
    script: tests/regression/run-thread-create-checkin-wait.sh
    note: Host RED->GREEN model for replacing sched_yield busy-spin with bounded futex wait.
