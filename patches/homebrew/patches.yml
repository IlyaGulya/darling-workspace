- path: darlingserver/microthread-resume-race.patch
  sha256sum: c937102741fc500bddc1374a2b3b11da3397c60d2c31352a2762caa6f0b66e6a
  module: darling/src/external/darlingserver
  source-branch: fix/microthread-resume-race
  source-commit: a99d52248f437be96239a22c8ce5f58fbf32d221
  bead: dar-q95.8
  publication-status: provisional
  publication-blocker: modeled wake-epoch and duplicate-scheduling tests under dar-q95.29.6
  tests:
  - name: microthread_resume_race_contract
    kind: contract
    coverage-tier: compile
    runs: host
    diag: bare
    runner: c-fixture
    repo: darling-workspace
    script: tests/microthread_resume_contract.cpp
    source-env: DSERVER_SRC_ROOT
    cc: c++
    include-dirs:
    - internal-include
    compile-flags:
    - -std=c++17
    - -Wall
    - -Wextra
    - -Werror
    note: Compile contract for the production microthread resume helper; the launch-free dserverdbg runtime oracle carries the RED proof for the old lost-wakeup behavior.
  - name: microthread_resume_before_suspend_guest
    kind: guest
    coverage-tier: runtime
    runs: guest
    diag: guarded
    red: true
    red-proof:
      mode: guest-runtime-deploy
      bad-profile: current-minus-patch
      current-minus-skip-patches:
      - darlingserver/processcall-exception-guard.patch
      - darlingserver/ingest-error-reply.patch
      - darlingserver/pushreply-pipe-leak.patch
      - darlingserver/exc-fatal-reply-bound.patch
      - darlingserver/pthread-canceled-xnu-semantics.patch
      - darlingserver/progress-metrics.patch
      - darlingserver/server-inline-fastpath.patch
      - darlingserver/checkin-rwlock-across-suspend.patch
      - darlingserver/per-call-rpc-metrics.patch
      - darlingserver/no-reply-fire-and-forget-rpcs.patch
      - darlingserver/guest-per-callnum-sleep-account.patch
      - darlingserver/checkin-retask-current-thread-uaf.patch
      - darlingserver/pot-guest-lifetime-binding.patch
      - darlingserver/test-diagnostics-trace.patch
      source-patches:
      - tests/fixtures/darlingserver/launchfree-test-diagnostics.patch
      - tests/fixtures/microthread/resume-before-suspend-hook.patch
      - tests/fixtures/microthread/thread-suspended-direct-suspend-oracle.patch
      - tests/fixtures/microthread/dserverdbg-resume-before-suspend-oracle.patch
      expect-output-contains:
      - test_fault.consume name=microthread.resume_before_suspend
      - microthread.suspend.inject_resume_before_suspend
      - DSERVERDBG_THREAD_SUSPENDED_RC=-11
      red-runner:
        runner: script
        repo: darling-workspace
        script: tests/run-dserverdbg-microthread-resume-before-suspend.sh
        timeout-seconds: 30
        host-temp-files:
        - env: DSERVER_TEST_FAULT_FILE
          prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend-fault
        host-trace-files:
        - env: DSERVER_TEST_TRACE_FILE
          prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend.trace
          contains:
          - test_fault.consume name=microthread.resume_before_suspend
          - microthread.suspend.inject_resume_before_suspend
      cmake-defines:
        DSERVER_TOOLS: true
      runtime-artifacts:
      - module: darling/src/external/darlingserver
        build-targets:
        - darlingserver
        - dserverdbg
        deploy:
        - bin/darlingserver
        - bin/dserverdbg
    runner: guest-c-fixture
    repo: darling-workspace
    script: tests/microthread_resume_before_suspend_guest.c
    ok-marker: MICROTHREAD_RESUME_BEFORE_SUSPEND_OK
    timeout-seconds: 15
    compile-flags:
    - -std=gnu11
    - -Wall
    - -Wextra
    - -Werror
    requires:
    - darling-prefix
    guest-env-vars:
      DSERVER_TEST_FAULT_FILE: /private/var/tmp/dserver-microthread-resume-before-suspend-fault
    host-temp-files:
    - env: DSERVER_TEST_FAULT_FILE
      prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend-fault
    host-trace-files:
    - env: DSERVER_TEST_TRACE_FILE
      prefix-relative-path: private/var/tmp/dserver-microthread-resume-before-suspend.trace
      contains:
      - test_fault.consume name=microthread.resume_before_suspend
      - microthread.dtape.resume_before_suspend
      - microthread.suspend.consume_pending_resume
    note: >-
      Guest runtime proof for the resume-before-suspend lost wakeup: a guest
      thread enters self thread_suspend while a guarded duct-tape diagnostic
      simulates the matching thread_resume before the microthread physically
      suspends. Fixed darlingserver records the early resume permit and returns
      from thread_suspend; bad current-minus runtime drops the wake and the
      guest fixture times out.
  pr-draft: pr-drafts/darlingserver-microthread-resume-race.md
  github:
    fork:
      repo: IlyaGulya/darlingserver
      base: preupstream/main
      state: local
    upstream:
      repo: darlinghq/darlingserver
      base: main
      state: local
- path: darlingserver/fork-checkin-bound.patch
  sha256sum: 91a33f2ae2b40b05f9c4fa806a65d6388298167b0ffa1000b2d38728fc776156
