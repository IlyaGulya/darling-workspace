runtime-profiles:
  # A runtime profile is a temporary deployment contract, not a patch manifest.
  # add_compat_test assigns the ordinary `homebrew` provider to guest cases by
  # default; a case names RUNTIME_PROFILE only when it intentionally exercises
  # a different runtime variant. west materializes the selected source profile
  # in disposable worktrees, builds these targets, deploys them under the
  # prefix lock, runs CTest, then restores the prefix byte-for-byte.
  homebrew:
    source-profile: homebrew
    source-module: darling/src/external/xnu
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    - darling/src/external/xnu
    runtime-artifacts:
    - module: darling/src/external/xnu
      build-targets:
      - system_kernel
      deploy:
      - usr/lib/system/libsystem_kernel.dylib
  homebrew-darlingserver:
    source-profile: homebrew
    source-module: darling/src/external/darlingserver
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    runtime-artifacts:
    - module: darling/src/external/darlingserver
      build-targets:
      - darlingserver
      deploy:
      - bin/darlingserver
  perf-darlingserver:
    # The fork/signal workload exercises server-side wait/reply recovery.
    # Build it from perf, which extends homebrew with the A0 hang-fix class;
    # west partitions this lifecycle from ordinary homebrew guest tests.
    source-profile: perf
    source-module: darling/src/external/darlingserver
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    cmake-defines:
      # perf's generated heatmap calls the ring classification API. The
      # server must therefore compile the ring interface even when a fixture
      # itself exercises only the ordinary UDS fork path.
      DSERVER_RING_TRANSPORT: true
    runtime-artifacts:
    - module: darling/src/external/darlingserver
      build-targets:
      - darlingserver
      deploy:
      - bin/darlingserver
  homebrew-libplatform:
    source-profile: homebrew
    source-module: darling/src/external/libplatform
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/libplatform
    runtime-artifacts:
    - module: darling/src/external/libplatform
      build-targets:
      - platform
      deploy:
      - usr/lib/system/libsystem_platform.dylib
  homebrew-rootless-no-mount:
    # Rootless CTest fixtures still compile inside Darling, so this runtime
    # variant has the same explicit CLT contract as the other CTest profiles.
    # The no-CLT boundary is homebrew-rootless-bootstrap-minimal below.
    source-profile: homebrew
    bootstrap: rootless-no-mount
    source-module: darling
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    - darling/src/external/xnu
    - darling/src/external/dyld
    - darling/src/external/corefoundation
    - darling/src/external/libsystem
    - darling/src/external/bash
    cmake-defines:
      # Rootless cannot use overlay or copy the shared template; its XNU and
      # dserver artifacts must agree on the E-UNION runtime contract.
      DARLING_EUNION: true
    launcher-env:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
    runtime-artifacts:
    - module: darling
      build-targets:
      - rootless_bootstrap
      resource: rootless-bootstrap
  homebrew-rootless-bootstrap-minimal:
    # The only prefix-baseline smoke: clean prefix, product bootstrap, no CLT.
    purpose: prefix-baseline
    bootstrap-smoke-timeout-seconds: 180
    source-profile: homebrew
    bootstrap: rootless-no-mount
    source-module: darling
    source-modules:
    - darling
    - darling/src/external/darlingserver
    - darling/src/external/xnu
    - darling/src/external/dyld
    - darling/src/external/corefoundation
    - darling/src/external/libsystem
    - darling/src/external/bash
    cmake-defines:
      DARLING_EUNION: true
    launcher-env:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
      DARLING_ROOTLESS_SHELLSPAWN_READY_TIMEOUT_MS: '60000'
    runtime-artifacts:
    - module: darling
      build-targets:
      - rootless_bootstrap
      resource: rootless-bootstrap
  homebrew-guest-toolchain-provisioning:
    # Scheduled/manual only. This is intentionally separate from all ordinary
    # guest regressions because it downloads and installs Apple's CLT packages.
    purpose: guest-toolchain-provisioning
    compiler-launcher: ccache
    bootstrap-smoke-timeout-seconds: 180
    source-profile: homebrew
    bootstrap: rootless-no-mount
    source-module: darling
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    - darling/src/external/xnu
    - darling/src/external/dyld
    - darling/src/external/corefoundation
    - darling/src/external/libsystem
    - darling/src/external/bash
    - darling/src/external/installer
    - darling/src/external/perl
    - darling/src/external/cfnetwork
    - darling/src/external/security
    - darling/src/external/coretls
    cmake-defines:
      DARLING_EUNION: true
      DARLING_ROOTLESS_TOOLCHAIN: true
    launcher-env:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
      DARLING_ROOTLESS_SHELLSPAWN_READY_TIMEOUT_MS: '60000'
    runtime-artifacts:
    - module: darling
      build-targets:
      - rootless_bootstrap
      resource: rootless-bootstrap
    - module: darling
      build-targets:
      - rootless_toolchain
      resource: rootless-toolchain
  homebrew-prefix-baseline:
    # Compatibility alias for callers that used the old name. New CI and
    # tooling must select the explicit provisioning profile above.
    purpose: guest-toolchain-provisioning
    source-profile: homebrew
    bootstrap: rootless-no-mount
    source-module: darling
    guest-toolchain: darling-command-line-tools
    source-modules:
    - darling
    - darling/src/external/darlingserver
    - darling/src/external/xnu
    - darling/src/external/dyld
    - darling/src/external/corefoundation
    - darling/src/external/libsystem
    - darling/src/external/bash
    - darling/src/external/installer
    - darling/src/external/perl
    - darling/src/external/cfnetwork
    - darling/src/external/security
    - darling/src/external/coretls
    cmake-defines:
      DARLING_EUNION: true
      DARLING_ROOTLESS_TOOLCHAIN: true
    launcher-env:
      DARLING_ROOTLESS: '1'
      DARLING_NOOVERLAYFS: '1'
      DARLING_EUNION: '1'
      DARLING_ROOTLESS_SHELLSPAWN_READY_TIMEOUT_MS: '60000'
    runtime-artifacts:
    - module: darling
      build-targets: [rootless_bootstrap]
      resource: rootless-bootstrap
    - module: darling
      build-targets: [rootless_toolchain]
      resource: rootless-toolchain
